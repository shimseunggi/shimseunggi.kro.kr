          contactDinoContext.stroke();
        }

        const eye = { x: headBase.x + dino.drawFace * 14 * scale, y: headBase.y - 7 * scale };
        if (contactRunnerState.status === "gameover") {
          contactDinoContext.lineWidth = 1.1;
          contactDinoContext.beginPath();
          contactDinoContext.moveTo(
            eye.x - dino.drawFace * 3 * scale,
            eye.y - 3 * scale,
          );
          contactDinoContext.lineTo(
            eye.x + dino.drawFace * 3 * scale,
            eye.y + 3 * scale,
          );
          contactDinoContext.moveTo(
            eye.x - dino.drawFace * 3 * scale,
            eye.y + 3 * scale,
          );
          contactDinoContext.lineTo(
            eye.x + dino.drawFace * 3 * scale,
            eye.y - 3 * scale,
          );
          contactDinoContext.stroke();
        } else if (dino.blink > 0) {
          contactDinoContext.lineWidth = 1;
          contactDinoContext.beginPath();
          contactDinoContext.moveTo(eye.x - dino.drawFace * 3 * scale, eye.y);
          contactDinoContext.lineTo(eye.x + dino.drawFace * 3 * scale, eye.y);
          contactDinoContext.stroke();
        } else {
          contactDinoContext.beginPath();
          contactDinoContext.arc(eye.x, eye.y, 1.8 * scale, 0, Math.PI * 2);
          contactDinoContext.fillStyle = "rgba(17,17,17,0.94)";
          contactDinoContext.fill();
        }

        if (dino.roar > 0) {
          const pulse = 1 - dino.roar;
          const waveDirection = dino.drawFace >= 0 ? 0 : Math.PI;
          const waveSpreadOuter = 0.5;
          const waveSpreadInner = 0.45;
          contactDinoContext.strokeStyle = `rgba(17,17,17,${(0.28 * dino.roar).toFixed(3)})`;
          contactDinoContext.lineWidth = 1.2;
          contactDinoContext.beginPath();
          contactDinoContext.arc(
            snout.x + dino.drawFace * 5 * scale,
            snout.y,
            10 * scale + pulse * 32,
            waveDirection - waveSpreadOuter,
            waveDirection + waveSpreadOuter,
          );
          contactDinoContext.stroke();
          contactDinoContext.beginPath();
          contactDinoContext.arc(
            snout.x + dino.drawFace * 5 * scale,
            snout.y,
            24 * scale + pulse * 86,
            waveDirection - waveSpreadInner,
            waveDirection + waveSpreadInner,
          );
          contactDinoContext.stroke();
        }

        const canvasRect = contactDinoCanvas.getBoundingClientRect();
        contactDinoState.snoutViewport.x = canvasRect.left + snout.x + dino.drawFace * 5 * scale;
        contactDinoState.snoutViewport.y = canvasRect.top + snout.y;
        contactDinoState.waveRadius =
          dino.roar > 0 ? 42 * scale + (1 - dino.roar) * 360 : 0;
      }

      function renderContactDino() {
        if (!contactDinoContext || !contactDinoState.dino) return;

        const { width, height } = contactDinoState;
        contactDinoContext.clearRect(0, 0, width, height);
        if (!contactDinoState.renderVisible) {
          contactDinoState.waveRadius = 0;
          return;
        }

        const dino = contactDinoState.dino;
        const scale = dino.scale;
        const runnerSceneBlend =
          contactRunnerState.status === "starting"
            ? contactRunnerState.transitionProgress
            : contactRunnerState.status === "playing" || contactRunnerState.status === "gameover"
              ? 1
              : 0;
        const runnerSceneActive = runnerSceneBlend > 0.001;
        const activeGroundY = runnerSceneActive
          ? contactRunnerState.groundY
          : dino.groundAt(width * 0.5);
        if (runnerSceneActive && contactRunnerState.moon) {
          contactDinoContext.save();
          contactDinoContext.globalAlpha = clampValue(runnerSceneBlend * 0.88, 0, 0.88);
          drawContactRunnerSprite(
            contactDinoContext,
            contactRunnerState.moon.sprite,
            contactRunnerState.moon.x,
            contactRunnerState.moon.y,
            scale,
          );
          contactDinoContext.restore();
        }
        if (runnerSceneActive && contactRunnerState.clouds.length) {
          contactDinoContext.save();
          contactDinoContext.globalAlpha = clampValue(runnerSceneBlend * 0.92, 0, 0.92);
          for (const cloud of contactRunnerState.clouds) {
            const drewCloud = drawContactRunnerSprite(
              contactDinoContext,
              CONTACT_RUNNER_SPRITES.cloud,
              cloud.x,
              cloud.y,
              scale,
            );

            if (!drewCloud) {
              drawPixelSprite(
                contactDinoContext,
                "cloud",
                cloud.x,
                cloud.y,
                cloud.pixelSize,
                "rgba(17,17,17,0.26)",
              );
            }
          }
          contactDinoContext.restore();
        }

        if (runnerSceneActive) {
          const groundY = contactRunnerState.groundY;
          const horizonSprite = CONTACT_RUNNER_SPRITES.horizon;
          const horizonWidth = horizonSprite.drawWidth * scale;
          const horizonY = groundY - horizonSprite.drawHeight * scale + 3 * scale;
          let horizonX = -((contactRunnerState.floorOffset % horizonWidth) + horizonWidth) % horizonWidth;
          let drewHorizon = false;

          contactDinoContext.save();
          contactDinoContext.globalAlpha = runnerSceneBlend;
          while (horizonX < width + horizonWidth) {
            drewHorizon = drawContactRunnerSprite(
              contactDinoContext,
              horizonSprite,
              horizonX,
              horizonY,
              scale,
            ) || drewHorizon;
            horizonX += horizonWidth;
          }

          if (!drewHorizon) {
            contactDinoContext.fillStyle = "rgba(17,17,17,0.8)";
            contactDinoContext.fillRect(0, groundY, width, 1.5 * scale);

            const pixelSize = 2 * scale;
            for (let index = 0; index < width; index += pixelSize) {
              let groundX = (index + contactRunnerState.floorOffset) % width;
              if (groundX < 0) {
                groundX += width;
              }

              const hash = Math.sin(index * 12.9898) * 43758.5453;
              const randomness = hash - Math.floor(hash);
              if (randomness < 0.03) {
                contactDinoContext.fillRect(
                  groundX,
                  groundY + pixelSize * (Math.floor(randomness * 100) % 3 + 1),
                  pixelSize,
                  pixelSize,
                );
              } else if (randomness < 0.05) {
                contactDinoContext.fillRect(
                  groundX,
                  groundY + pixelSize * (Math.floor(randomness * 100) % 2 + 1),
                  pixelSize * 2,
                  pixelSize,
                );
              } else if (randomness < 0.06) {
                contactDinoContext.fillRect(
                  groundX,
                  groundY + pixelSize * 3,
                  pixelSize * 3,
                  pixelSize,
                );
              }
            }
          }
          contactDinoContext.restore();

          for (const obstacle of contactRunnerState.obstacles) {
            let drewObstacle = false;
            if (obstacle.type === 2) {
              const frame = Math.floor(contactRunnerState.distance / 60) % 2;
              drewObstacle = drawContactRunnerSprite(
                contactDinoContext,
                CONTACT_RUNNER_SPRITES.bird,
                obstacle.x,
                obstacle.y,
                scale,
                frame,
              );
            } else if (obstacle.spriteKey === "cactus1") {
              drewObstacle = drawContactRunnerSprite(
                contactDinoContext,
                CONTACT_RUNNER_SPRITES.cactusSmall,
                obstacle.x,
                obstacle.y,
                scale,
              );
            } else if (obstacle.spriteKey === "cactus3") {
              drewObstacle = drawContactRunnerSprite(
                contactDinoContext,
                CONTACT_RUNNER_SPRITES.cactusLarge,
                obstacle.x,
                obstacle.y,
                scale,
              );
            } else {
              const firstX = obstacle.x;
              const secondX = obstacle.x + CONTACT_RUNNER_SPRITES.cactusSmall.drawWidth * 0.8 * scale;
              drewObstacle =
                drawContactRunnerSprite(
                  contactDinoContext,
                  CONTACT_RUNNER_SPRITES.cactusSmall,
                  firstX,
                  obstacle.y + 12 * scale,
                  scale,
                ) || drewObstacle;
              drewObstacle =
                drawContactRunnerSprite(
                  contactDinoContext,
                  CONTACT_RUNNER_SPRITES.cactusLarge,
                  secondX,
                  obstacle.y,
                  scale,
                ) || drewObstacle;
            }

            if (!drewObstacle) {
              let drawSpriteKey = obstacle.spriteKey;
              if (obstacle.type === 2) {
                const frame = Math.floor(contactRunnerState.distance / 60) % 2;
                drawSpriteKey = frame === 0 ? "birdUp" : "birdDown";
              }
              drawPixelSprite(
                contactDinoContext,
                drawSpriteKey,
                obstacle.x,
                obstacle.y,
                obstacle.pixelSize,
                "rgba(17,17,17,0.92)",
              );
            }
          }
        }

        if (runnerSceneBlend < 0.999) {
          contactDinoContext.save();
          contactDinoContext.globalAlpha = clampValue(1 - runnerSceneBlend * 0.9, 0.12, 1);
          contactDinoContext.strokeStyle = "rgba(17,17,17,0.14)";
          contactDinoContext.lineWidth = 1;
          contactDinoContext.beginPath();
          for (let x = 0; x <= width; x += 8) {
            const y = dino.groundAt(x);
            if (x === 0) {
              contactDinoContext.moveTo(x, y);
            } else {
              contactDinoContext.lineTo(x, y);
            }
          }
          contactDinoContext.stroke();
          contactDinoContext.restore();
        }

        const bob = Math.sin(dino.walk * 2.4) * Math.min(4.5 * scale, Math.abs(dino.vx) * 0.18);
        const duckOffset = contactRunnerState.status !== "inactive" && contactRunnerState.isDucking
          ? 18 * scale
          : 0;
        const hip = { x: dino.x, y: dino.y + bob + duckOffset * 0.5 };
        const chest = { x: hip.x + dino.drawFace * 40 * scale, y: hip.y - 15 * scale + duckOffset };
        const neck1 = { x: chest.x + dino.drawFace * 16 * scale, y: chest.y - 10 * scale + duckOffset };
        const neck2 = { x: neck1.x + dino.drawFace * 12 * scale, y: neck1.y - 12 * scale + duckOffset };
        const headBase = { x: neck2.x + dino.drawFace * 6 * scale, y: neck2.y - 1 * scale + duckOffset };
        const tail1 = { x: hip.x - dino.drawFace * 30 * scale, y: hip.y - 8 * scale };
        const tail2 = {
          x: tail1.x - dino.drawFace * 34 * scale,
          y: tail1.y - 4 * scale + Math.sin(dino.walk) * 7 * scale,
        };
        const tail3 = {
          x: tail2.x - dino.drawFace * 36 * scale,
          y: tail2.y + Math.sin(dino.walk + 0.8) * 9 * scale,
        };

        const hipFar = { x: hip.x + dino.drawFace * 8 * scale, y: hip.y + 3 * scale };
        const hipNear = { x: hip.x - dino.drawFace * 6 * scale, y: hip.y + 4 * scale };
        const shoulderFar = { x: chest.x - dino.drawFace * 7 * scale, y: chest.y + 5 * scale };
        const shoulderNear = { x: chest.x - dino.drawFace * 1 * scale, y: chest.y + 7 * scale };

        drawContactDinoLeg(
          hipFar,
          { x: dino.footBackFar.x, y: dino.footBackFar.y },
          26 * scale,
          24 * scale,
          true,
        );
        drawContactDinoArm(shoulderFar, dino.walk + Math.PI, true);

        contactDinoContext.strokeStyle = "rgba(17,17,17,0.94)";
        contactDinoContext.lineWidth = 2.5;
        contactDinoContext.lineCap = "round";
        contactDinoContext.lineJoin = "round";
        drawContactPolyline([tail3, tail2, tail1, hip, chest, neck1, neck2, headBase]);

        contactDinoContext.lineWidth = 1.2;
        drawContactPolyline([
          { x: hip.x + dino.drawFace * 7 * scale, y: hip.y + 11 * scale },
          { x: chest.x - dino.drawFace * 6 * scale, y: chest.y + 12 * scale },
          { x: neck1.x - dino.drawFace * 2 * scale, y: neck1.y + 8 * scale },
        ]);

        drawContactDinoLeg(
          hipNear,
          { x: dino.footBackNear.x, y: dino.footBackNear.y },
          28 * scale,
          26 * scale,
          false,
        );
        drawContactDinoArm(shoulderNear, dino.walk, false);

        const jawOpen = contactDinoState.pointer.down
          ? 12 * scale
          : dino.roar > 0
            ? 8 * scale
            : 0;
        drawContactDinoHead(headBase, jawOpen);
      }

      function runContactDinoLoop(now) {
        const dt = contactDinoState.lastAt
          ? Math.min(0.033, (now - contactDinoState.lastAt) / 1000)
          : 0.016;
        contactDinoState.lastAt = now;
        try {
          if (contactRunnerState.status === "inactive") {
            updateContactDino(dt);
          } else {
            updateContactRunner(dt);
          }
          renderContactDino();
          updateContactRunnerHud();
          updateContactTextBlast();
        } catch (error) {
          console.error("Contact dino loop failed:", error);
          contactDinoState.signalEffectEnabled = false;
          restoreContactEffectText();
        }
        contactDinoState.rafId = window.requestAnimationFrame(runContactDinoLoop);
      }

      function prepareNavButtonLetters() {
        navButtons.forEach((button) => {
          if (button.dataset.fractureReady === "true") return;

          const text = (button.textContent || "").trim();
          button.dataset.fractureReady = "true";
          button.setAttribute("aria-label", text);

          const label = document.createElement("span");
          label.className = "nav-button-label";
          label.setAttribute("aria-hidden", "true");
          const charNodes = [];

          [...text].forEach((character, index) => {
            const char = document.createElement("span");
            char.className = `nav-button-char${character === " " ? " is-space" : ""}`;
            char.textContent = character === " " ? "\u00a0" : character;
            char.dataset.char = character;
            char.style.setProperty("--fracture-index", String(index));
            label.append(char);
            charNodes.push(char);
          });

          button.textContent = "";
          button.append(label);
          button._navChars = charNodes;
          navFractureState.set(button, { intensity: 0, impactX: 0, impactY: 0, active: false });
        });

        invalidateNavFractureMetrics();
      }

      function queueNavIntroScramble() {
        if (state.navIntroScramblePlayed || state.navIntroScrambleRunning) return;

        if (state.navIntroScrambleTimerId) {
          window.clearTimeout(state.navIntroScrambleTimerId);
          state.navIntroScrambleTimerId = 0;
        }

        const start = () => {
          state.navIntroScrambleTimerId = 0;
          if (state.navIntroScramblePlayed || state.navIntroScrambleRunning) return;
          runNavIntroScramble();
        };

        const schedule = () => {
          state.navIntroScrambleTimerId = window.setTimeout(() => {
            window.requestAnimationFrame(start);
          }, 260);
        };

        if (document.fonts?.ready) {
          document.fonts.ready.then(schedule);
          return;
        }

        schedule();
      }

      function runNavIntroScramble() {
        if (state.navIntroScramblePlayed || state.navIntroScrambleRunning) return;

        const labels = navButtons
          .map((button) => getNavButtonChars(button))
          .filter((chars) => chars.length);

        if (!labels.length) return;

        state.navIntroScrambleRunning = true;
        state.navIntroScrambleRafId = scrambleCharacterGroups(labels, {
          groupDelay: 72,
          scrambleWindow: 360,
          revealStep: 28,
          initialStride: 5,
          setFrameId: (frameId) => {
            state.navIntroScrambleRafId = frameId;
          },
          onComplete: () => {
            state.navIntroScramblePlayed = true;
            state.navIntroScrambleRunning = false;
            state.navIntroScrambleRafId = 0;
            invalidateNavFractureMetrics();
          },
        });
      }

      function prepareContactTextLetters() {
        const items = contactPanel.querySelectorAll(".contact-line, .contact-kicker");
        state.contactTextItems = [...items];
        items.forEach((item) => {
          if (item.dataset.blastReady === "true") return;

          const text = (item.textContent || "").trim();
          item.dataset.blastReady = "true";
          const label = document.createElement("span");
          label.className = "contact-text-label";
          label.setAttribute("aria-hidden", "true");
          const charNodes = [];

          [...text].forEach((character) => {
            const char = document.createElement("span");
            char.className = `contact-text-char${character === " " ? " is-space" : ""}`;
            char.textContent = character === " " ? "\u00a0" : character;
            char.dataset.char = character;
            label.append(char);
            charNodes.push(char);
          });

          item.setAttribute("aria-label", text);
          item.textContent = "";
          item.append(label);
          item._contactChars = charNodes;
          contactTextFractureState.set(item, {
            intensity: 0,
            impactX: 0,
            impactY: 0,
            active: false,
          });
        });
      }

      function getNavButtonChars(button) {
        if (button._navChars) return button._navChars;
        button._navChars = [...button.querySelectorAll(".nav-button-char")];
        return button._navChars;
      }

      function getContactTextChars(item) {
        if (item._contactChars) return item._contactChars;
        item._contactChars = [...item.querySelectorAll(".contact-text-char")];
        return item._contactChars;
      }

      function setNodeTextValue(node, value) {
        if (node.__displayText === value) return;
        node.textContent = value;
        node.__displayText = value;
      }

      function setNodeStyleValue(node, property, value) {
        if (!node.__styleValueCache) {
          node.__styleValueCache = Object.create(null);
        }

        if (node.__styleValueCache[property] === value) return;
        node.style.setProperty(property, value);
        node.__styleValueCache[property] = value;
      }

      function clearNodeStyleValue(node, property) {
        if (!node.__styleValueCache || !(property in node.__styleValueCache)) return;
        node.style.removeProperty(property);
        delete node.__styleValueCache[property];
      }

      function getStaticCharValue(node) {
        return node.classList.contains("is-space") ? "\u00a0" : node.dataset.char || "";
      }

      function resetContactTextNode(node) {
        setNodeTextValue(node, getStaticCharValue(node));
        clearNodeStyleValue(node, "--contact-blast-x");
        clearNodeStyleValue(node, "--contact-blast-y");
        clearNodeStyleValue(node, "--contact-blast-rotate");
        clearNodeStyleValue(node, "--contact-blast-opacity");
        clearNodeStyleValue(node, "--contact-blast-blur");
        clearNodeStyleValue(node, "--contact-blast-scale");
      }

      function resetNavTextNode(node) {
        setNodeTextValue(node, getStaticCharValue(node));
        clearNodeStyleValue(node, "--fracture-x");
        clearNodeStyleValue(node, "--fracture-y");
        clearNodeStyleValue(node, "--fracture-rotate");
        clearNodeStyleValue(node, "--fracture-opacity");
        clearNodeStyleValue(node, "--fracture-blur");
      }

      function queueContactIntroScramble() {
        if (!state.contactTextItems.length) return;

        if (state.contactIntroScrambleTimerId) {
          window.clearTimeout(state.contactIntroScrambleTimerId);
          state.contactIntroScrambleTimerId = 0;
        }

        if (state.contactIntroScrambleRafId) {
          window.cancelAnimationFrame(state.contactIntroScrambleRafId);
          state.contactIntroScrambleRafId = 0;
        }

        state.contactTextItems.forEach((item) => {
          getContactTextChars(item).forEach((char) => {
            if (char.classList.contains("is-space")) return;
            setNodeTextValue(char, char.dataset.char || "");
          });
        });

        state.contactIntroScrambleTimerId = window.setTimeout(() => {
          state.contactIntroScrambleTimerId = 0;
          runContactIntroScramble();
        }, 120);
      }

      function runContactIntroScramble() {
        const groups = state.contactTextItems
          .map((item) => getContactTextChars(item))
          .filter((chars) => chars.length);

        if (!groups.length) return;

        state.contactIntroScrambleRafId = scrambleCharacterGroups(groups, {
          groupDelay: 56,
          scrambleWindow: 300,
          revealStep: 24,
          initialStride: 4,
          setFrameId: (frameId) => {
            state.contactIntroScrambleRafId = frameId;
          },
          onComplete: () => {
            state.contactIntroScrambleRafId = 0;
          },
        });
      }

      function scrambleCharacterGroups(
        groups,
        {
          groupDelay = 72,
          scrambleWindow = 360,
          revealStep = 28,
          initialStride = 5,
          cycleStep = 34,
          setFrameId = null,
          onComplete,
        } = {},
      ) {
        const entries = groups
          .filter((chars) => chars.length)
          .map((chars, groupIndex) => ({
            chars,
            revealStart: groupIndex * groupDelay,
            revealRanks: getScrambleRevealRanks(chars),
            revealCount: chars.filter((char) => !char.classList.contains("is-space")).length,
          }));

        if (!entries.length) {
          onComplete?.();
          return 0;
        }

        const startedAt = performance.now();

        entries.forEach(({ chars }, groupIndex) => {
          chars.forEach((char, index) => {
            if (char.classList.contains("is-space")) return;
            setNodeTextValue(char, char.dataset.char || "");
            setNodeStyleValue(char, "opacity", "0");
          });
        });

        const tick = (now) => {
          let doneCount = 0;

          entries.forEach(({ chars, revealStart, revealRanks, revealCount: totalRevealCount }) => {
            const elapsed = now - startedAt - revealStart;

            chars.forEach((char, index) => {
              if (char.classList.contains("is-space")) return;

              const original = char.dataset.char || "";
              const revealRank = revealRanks[index];
              const revealAt = Math.max(0, revealRank) * revealStep;
              const localElapsed = elapsed - revealAt;

              if (localElapsed < 0) {
                setNodeTextValue(char, original);
                setNodeStyleValue(char, "opacity", "0");
                return;
              }

              setNodeStyleValue(char, "opacity", "1");

              if (localElapsed >= scrambleWindow) {
                setNodeTextValue(char, original);
                return;
              }

              const sequenceOffset = Math.max(
                0,
                Math.floor(localElapsed / Math.max(12, cycleStep)),
              );
              const glyphIndex =
                (revealStart + index * initialStride + sequenceOffset) %
                NAV_SCRAMBLE_GLYPHS.length;
              setNodeTextValue(char, NAV_SCRAMBLE_GLYPHS[glyphIndex]);
            });

            const lastRevealRank = totalRevealCount - 1;
            if (elapsed >= scrambleWindow + Math.max(0, lastRevealRank) * revealStep) {
              doneCount += 1;
            }
          });

          if (doneCount >= entries.length) {
            entries.forEach(({ chars }) => {
              chars.forEach((char) => {
                if (char.classList.contains("is-space")) return;
                setNodeTextValue(char, char.dataset.char || "");
                clearNodeStyleValue(char, "opacity");
              });
            });
            onComplete?.();
            return;
          }

          const nextFrameId = window.requestAnimationFrame(tick);
          setFrameId?.(nextFrameId);
        };

        const firstFrameId = window.requestAnimationFrame(tick);
        setFrameId?.(firstFrameId);
        return firstFrameId;
      }

      function getScrambleRevealRanks(chars) {
        const nonSpaceChars = chars.filter((char) => !char.classList.contains("is-space"));
        const revealRanks = new Array(chars.length).fill(-1);
        if (!nonSpaceChars.length) return revealRanks;

        const firstRect = nonSpaceChars[0].getBoundingClientRect();
        const lastRect = nonSpaceChars[nonSpaceChars.length - 1].getBoundingClientRect();
        const leftDistance = firstRect.left;
        const rightDistance = window.innerWidth - lastRect.right;
        const leftToRight = leftDistance <= rightDistance;

        let seen = 0;
        chars.forEach((char, index) => {
          if (char.classList.contains("is-space")) return;
          revealRanks[index] = leftToRight ? seen : nonSpaceChars.length - 1 - seen;
          seen += 1;
        });

        return revealRanks;
      }

      function getScrambleTargetIndex(character) {
        if (!character) return -1;
        return NAV_SCRAMBLE_GLYPHS.indexOf(character.toLowerCase());
      }

      function getScrambleProgressChar(character, step) {
        if (!character) return "";

        const targetIndex = getScrambleTargetIndex(character);
        if (targetIndex < 0) {
          return character;
        }

        const isUppercase =
          character.toUpperCase() === character && character.toLowerCase() !== character;
        const glyph = NAV_SCRAMBLE_GLYPHS[clampValue(step, 0, targetIndex)] || character;

        if (isUppercase && glyph >= "a" && glyph <= "z") {
          return glyph.toUpperCase();
        }

        return glyph;
      }

      function resolveSignalScrambleChar(original, index, signal, timeSource, sequenceOffset = 0) {
        if (!original) return "";

        const normalizedSignal = clampValue(signal, 0, 1);
        if (normalizedSignal < 0.08) {
          return original;
        }

        const targetIndex = getScrambleTargetIndex(original);
        if (targetIndex <= 0) {
          return original;
        }

        const frame = Math.floor(timeSource / 96);
        const cycleLength = targetIndex + 3;
        const cycleStep = (frame + sequenceOffset + index) % cycleLength;

        if (cycleStep > targetIndex) {
          return original;
        }

        const visibleDepth = Math.max(1, Math.round(normalizedSignal * (targetIndex + 1)));
        return getScrambleProgressChar(original, Math.min(cycleStep, visibleDepth - 1));
      }

      function restoreContactEffectText() {
        state.contactTextItems.forEach((item) => {
          item.classList.remove("is-blasted");
          getContactTextChars(item).forEach(resetContactTextNode);
          const blast = contactTextFractureState.get(item);
          if (blast) blast.active = false;
        });
      }

      function restoreNavEffectText() {
        navButtons.forEach((button) => {
          button.classList.remove("is-fractured");
          getNavButtonChars(button).forEach(resetNavTextNode);
          const fracture = navFractureState.get(button);
          if (fracture) fracture.active = false;
        });
      }

      function invalidateContactTextMetrics() {
        state.contactTextItems.forEach((item) => {
          contactTextLayoutCache.delete(item);
        });
      }

      function getContactTextMetrics(item) {
        const cached = contactTextLayoutCache.get(item);
        if (cached) return cached;

        const itemRect = item.getBoundingClientRect();
        const chars = getContactTextChars(item).map((char, index) => {
          const charRect = char.getBoundingClientRect();
          return {
            node: char,
            index,
            isSpace: char.classList.contains("is-space"),
            centerOffsetX: charRect.left + charRect.width * 0.5 - itemRect.left,
            centerOffsetY: charRect.top + charRect.height * 0.5 - itemRect.top,
          };
        });

        const metrics = { chars };
        contactTextLayoutCache.set(item, metrics);
        return metrics;
      }

      function setContactTextBlast(
        item,
        intensity,
        impactX,
        impactY,
        metrics = null,
        itemRect = null,
      ) {
        if (intensity < 0.03) {
          item.classList.remove("is-blasted");
          getContactTextChars(item).forEach(resetContactTextNode);
          return;
        }

        const activeMetrics = metrics || getContactTextMetrics(item);
        if (!activeMetrics.chars.length) return;

        item.classList.add("is-blasted");
        const activeRect = itemRect || item.getBoundingClientRect();
        activeMetrics.chars.forEach(({ node, index, isSpace, centerOffsetX, centerOffsetY }) => {
          if (isSpace) {
            setNodeTextValue(node, "\u00a0");
            setNodeStyleValue(node, "--contact-blast-x", "0px");
            setNodeStyleValue(node, "--contact-blast-y", "0px");
            setNodeStyleValue(node, "--contact-blast-rotate", "0deg");
            setNodeStyleValue(node, "--contact-blast-opacity", "1");
            setNodeStyleValue(node, "--contact-blast-blur", "0px");
            setNodeStyleValue(node, "--contact-blast-scale", "1");
            return;
          }

          const centerX = activeRect.left + centerOffsetX;
          const centerY = activeRect.top + centerOffsetY;
          const dx = centerX - impactX;
          const dy = centerY - impactY;
          const distance = Math.hypot(dx, dy) || 1;
          const reach = 110 + intensity * 36;
          const falloff = Math.max(0, 1 - distance / reach);
          const signal = clampValue((intensity / 5.4) * falloff * 1.65, 0, 1);
          setNodeTextValue(node, resolveSignalScrambleChar(
            node.dataset.char || "",
            index,
            signal,
            contactDinoState.lastAt,
            Math.round(distance * 0.08),
          ));
          setNodeStyleValue(node, "--contact-blast-x", "0px");
          setNodeStyleValue(node, "--contact-blast-y", "0px");
          setNodeStyleValue(node, "--contact-blast-rotate", "0deg");
          setNodeStyleValue(node, "--contact-blast-opacity", `${(1 - signal * 0.08).toFixed(2)}`);
          setNodeStyleValue(node, "--contact-blast-blur", "0px");
          setNodeStyleValue(node, "--contact-blast-scale", "1");
        });
      }

      function updateContactTextBlast() {
        if (!contactDinoState.signalEffectEnabled) {
          restoreContactEffectText();
          return;
        }

        const items = state.contactTextItems;
        const isRoaring = state.activeSection === "contact" && contactDinoState.waveRadius > 0;
        const isPlaying = state.activeSection === "contact" && contactRunnerState.status === "playing";
        const active = isRoaring || isPlaying;
        let hasVisibleBlast = false;
        let trackX = contactDinoState.snoutViewport.x;
        let trackY = contactDinoState.snoutViewport.y;

        if (contactDinoState.dino) {
          const scale = contactDinoState.dino.scale;
          const canvasRect = contactDinoCanvas.getBoundingClientRect();
          trackX = canvasRect.left + contactDinoState.dino.x + 15 * scale;
          trackY = canvasRect.top + contactDinoState.dino.y - 20 * scale;
        }

        items.forEach((item) => {
          const blast =
            contactTextFractureState.get(item) || { intensity: 0, impactX: 0, impactY: 0, active: false };

          if (!active) {
            if (blast.intensity < 0.03 && !blast.active) {
              return;
            }
            blast.intensity += (0 - blast.intensity) * 0.18;
            if (blast.intensity < 0.03) {
              blast.intensity = 0;
              if (blast.active) {
                setContactTextBlast(item, 0, blast.impactX, blast.impactY);
                blast.active = false;
              }
              contactTextFractureState.set(item, blast);
              return;
            }
            setContactTextBlast(item, blast.intensity, blast.impactX, blast.impactY);
            blast.active = true;
            hasVisibleBlast = true;
            contactTextFractureState.set(item, blast);
            return;
          }

          const rect = item.getBoundingClientRect();
          const metrics = getContactTextMetrics(item);
          let targetIntensity = 0;
          let currentImpactX = blast.impactX;
          let currentImpactY = blast.impactY;

          if (isRoaring) {
            const centerX = rect.left + rect.width * 0.5;
            const centerY = rect.top + rect.height * 0.5;
            const distance = Math.hypot(
              centerX - contactDinoState.snoutViewport.x,
              centerY - contactDinoState.snoutViewport.y,
            );
            const band = 120;
            targetIntensity = Math.max(
              targetIntensity,
              Math.min(5.4, (band - Math.abs(distance - contactDinoState.waveRadius)) / 18),
            );
            currentImpactX = contactDinoState.snoutViewport.x;
            currentImpactY = contactDinoState.snoutViewport.y;
          }

          if (isPlaying) {
            let minCharDistance = Number.POSITIVE_INFINITY;
            metrics.chars.forEach((charMetric) => {
              if (charMetric.isSpace) return;
              const charX = rect.left + charMetric.centerOffsetX;
              const charY = rect.top + charMetric.centerOffsetY;
              const distance = Math.hypot(charX - trackX, charY - trackY);
              if (distance < minCharDistance) {
                minCharDistance = distance;
              }
            });

            const auraRadius = 110 * (contactDinoState.dino ? contactDinoState.dino.scale : 1);
            if (minCharDistance < auraRadius) {
              const playIntensity = Math.max(0, Math.min(5.4, (auraRadius - minCharDistance) / 12));
              if (playIntensity > targetIntensity) {
                targetIntensity = playIntensity;
                currentImpactX = trackX;
                currentImpactY = trackY;
              }
            }
          }

          blast.intensity +=
            (targetIntensity - blast.intensity) *
            (targetIntensity > blast.intensity ? 0.35 : 0.12);
          blast.impactX += (currentImpactX - blast.impactX) * 0.3;
          blast.impactY += (currentImpactY - blast.impactY) * 0.3;
          if (blast.intensity < 0.03) {
            blast.intensity = 0;
            if (blast.active) {
              setContactTextBlast(item, 0, blast.impactX, blast.impactY);
              blast.active = false;
            }
            contactTextFractureState.set(item, blast);
            return;
          }

          setContactTextBlast(item, blast.intensity, blast.impactX, blast.impactY, metrics, rect);
          blast.active = true;
          hasVisibleBlast = true;
          contactTextFractureState.set(item, blast);
        });

        contactPanel.classList.toggle("is-blasted", hasVisibleBlast);
      }

      function getHomeLizardAnchorPoint() {
        if (!homeNavButton) {
          return {
            x: lizardState.width * 0.22,
            y: Math.min(lizardState.height * 0.28, 220),
          };
        }

        const rect = homeNavButton.getBoundingClientRect();
        return {
          x: rect.left + rect.width * 0.72,
          y: rect.top - Math.max(56, rect.height * 1.6),
        };
      }

      function getHomeLizardParkedPoint() {
        const anchor = getHomeLizardAnchorPoint();
        return {
          x: anchor.x,
          y: anchor.y - Math.max(340, lizardState.height * 0.42),
        };
      }

      function getHomeLizardCenterPoint() {
        const desiredBodyCenterY = lizardState.height * 0.56;
        const headY = clampValue(
          desiredBodyCenterY -
            HOME_LIZARD_CONFIG.segmentLength * HOME_LIZARD_CONFIG.centerBodyIndex,
          88,
          Math.max(88, lizardState.height - 88),
        );

        return {
          x: lizardState.width * 0.5,
          y: headY,
        };
      }

      function shouldUseHomeLizardCenterFallback() {
        if (lizardState.hasPointerTarget) return false;
        return !window.matchMedia("(hover: hover) and (pointer: fine)").matches;
      }

      function updateHomeLizardAnchors() {
        const anchor = getHomeLizardAnchorPoint();
        const parked = getHomeLizardParkedPoint();
        lizardState.anchor.x = anchor.x;
        lizardState.anchor.y = anchor.y;
        lizardState.parked.x = parked.x;
        lizardState.parked.y = parked.y;
      }

      function updateHomeLizardState(previousSection = "") {
        updateHomeLizardAnchors();

        if (state.activeSection === "home") {
          if (previousSection !== "home") {
            setupLizard();
          }
          lizardState.renderVisible = true;
          homeLizardStage.classList.add("is-visible");
          if (previousSection !== "home" || lizardState.mode === "parked") {
            lizardState.mode = "entering";
          }
          lizardState.exitStartedAt = 0;
          startLizardLoop();
          return;
        }

        if (previousSection === "home" || lizardState.mode === "active" || lizardState.mode === "entering") {
          lizardState.renderVisible = true;
          lizardState.mode = "exiting";
          lizardState.exitOrigin.x = lizardState.critter?.x ?? lizardState.anchor.x;
          lizardState.exitOrigin.y = lizardState.critter?.y ?? lizardState.anchor.y;
          lizardState.exitStartedAt = performance.now();
          homeLizardStage.classList.add("is-visible");
          startLizardLoop();
          return;
        }

        if (lizardState.mode === "parked") {
          lizardState.renderVisible = false;
          homeLizardStage.classList.remove("is-visible");
          lizardState.exitStartedAt = 0;
        }
      }

      function invalidateNavFractureMetrics() {
        navButtons.forEach((button) => {
          navButtonLayoutCache.delete(button);
        });
      }

      function getButtonFractureMetrics(button) {
        const cached = navButtonLayoutCache.get(button);
        if (cached) return cached;

        const rect = button.getBoundingClientRect();
        const chars = getNavButtonChars(button).map((char) => {
          const charRect = char.getBoundingClientRect();
          return {
            node: char,
            index: Number.parseInt(char.style.getPropertyValue("--fracture-index"), 10) || 0,
            isSpace: char.classList.contains("is-space"),
            centerX: charRect.left + charRect.width * 0.5,
            centerY: charRect.top + charRect.height * 0.5,
          };
        });

        const metrics = { rect, chars };
        navButtonLayoutCache.set(button, metrics);
        return metrics;
      }

      function setButtonFracture(button, intensity, impactX, impactY, metrics = null) {
        if (intensity < 0.04) {
          button.classList.remove("is-fractured");
          getNavButtonChars(button).forEach(resetNavTextNode);
          return;
        }

        const activeMetrics = metrics || getButtonFractureMetrics(button);
        if (!activeMetrics.chars.length) return;

        button.classList.add("is-fractured");
        activeMetrics.chars.forEach(({ node, index, isSpace, centerX, centerY }) => {
          if (isSpace) {
            setNodeTextValue(node, "\u00a0");
            setNodeStyleValue(node, "--fracture-x", "0px");
            setNodeStyleValue(node, "--fracture-y", "0px");
            setNodeStyleValue(node, "--fracture-rotate", "0deg");
            setNodeStyleValue(node, "--fracture-opacity", "1");
            setNodeStyleValue(node, "--fracture-blur", "0px");
            return;
          }

          const dx = centerX - impactX;
          const dy = centerY - impactY;
          const distance = Math.hypot(dx, dy) || 1;
          const reach = 78 + intensity * 18;
          const falloff = Math.max(0, 1 - distance / reach);
          const signal = clampValue(intensity * falloff * 0.42, 0, 1);
          setNodeTextValue(node, resolveSignalScrambleChar(
            node.dataset.char || "",
            index,
            signal,
            lizardState.time * 16,
            Math.round(distance * 0.12),
          ));
          setNodeStyleValue(node, "--fracture-x", "0px");
          setNodeStyleValue(node, "--fracture-y", "0px");
          setNodeStyleValue(node, "--fracture-rotate", "0deg");
          setNodeStyleValue(node, "--fracture-opacity", `${(1 - signal * 0.08).toFixed(2)}`);
          setNodeStyleValue(node, "--fracture-blur", "0px");
        });
      }

      function getLizardImpactPoint(rect, padding = 10) {
        const expandedLeft = rect.left - padding;
        const expandedRight = rect.right + padding;
        const expandedTop = rect.top - padding;
        const expandedBottom = rect.bottom + padding;
        let best = null;

        for (let index = 0; index < lizardState.nodes.length; index += 1) {
          const node = lizardState.nodes[index];
          const dx =
            node.x < expandedLeft
              ? expandedLeft - node.x
              : node.x > expandedRight
                ? node.x - expandedRight
                : 0;
          const dy =
            node.y < expandedTop
              ? expandedTop - node.y
              : node.y > expandedBottom
                ? node.y - expandedBottom
                : 0;
          const distance = Math.hypot(dx, dy);

          if (!best || distance < best.distance) {
            best = { distance, x: node.x, y: node.y };
          }
        }

        return best;
      }

      function updateLizardTextFracture() {
        if (!state.lizardSignalEffectEnabled) {
          restoreNavEffectText();
          return;
        }

        navButtons.forEach((button) => {
          const fracture = navFractureState.get(button) || {
            intensity: 0,
            impactX: 0,
            impactY: 0,
            active: false,
          };

          if (!lizardState.renderVisible || !lizardState.critter) {
            if (fracture.intensity < 0.04 && !fracture.active) {
              return;
            }
            fracture.intensity += (0 - fracture.intensity) * 0.24;
            if (fracture.intensity < 0.04) {
              fracture.intensity = 0;
              if (fracture.active) {
                setButtonFracture(button, 0, fracture.impactX, fracture.impactY);
                fracture.active = false;
              }
              navFractureState.set(button, fracture);
              return;
            }
            setButtonFracture(button, fracture.intensity, fracture.impactX, fracture.impactY);
            fracture.active = true;
            navFractureState.set(button, fracture);
            return;
          }

          const metrics = getButtonFractureMetrics(button);
          const impact = getLizardImpactPoint(metrics.rect, 8);
          const targetIntensity = impact
            ? Math.max(0, Math.min(4.6, (84 - impact.distance) / 18))
            : 0;

          fracture.intensity +=
            (targetIntensity - fracture.intensity) *
            (targetIntensity > fracture.intensity ? 0.28 : 0.18);

          if (impact) {
            fracture.impactX += (impact.x - fracture.impactX) * 0.34;
            fracture.impactY += (impact.y - fracture.impactY) * 0.34;
          }

          if (fracture.intensity < 0.04) {
            fracture.intensity = 0;
            if (fracture.active) {
              setButtonFracture(button, 0, fracture.impactX, fracture.impactY);
              fracture.active = false;
            }
            navFractureState.set(button, fracture);
            return;
          }

          setButtonFracture(button, fracture.intensity, fracture.impactX, fracture.impactY, metrics);
          fracture.active = true;
          navFractureState.set(button, fracture);
        });
      }

      function getHomeLizardNodes() {
        if (lizardState.renderPoints.length) return lizardState.renderPoints;
        return lizardState.points;
      }

      function easeOutCubic(value) {
        return 1 - (1 - value) ** 4;
      }

      function angleDiff(a, b) {
        let diff = a - b;
        while (diff < -Math.PI) diff += Math.PI * 2;
        while (diff > Math.PI) diff -= Math.PI * 2;
        return diff;
      }

      function lerpAngle(a, b, t) {
        return a + angleDiff(b, a) * t;
      }

      function easeInOutSine(value) {
        return -(Math.cos(Math.PI * value) - 1) / 2;
      }

      function measureLizardBounds() {
        const nodes = getHomeLizardNodes();
        if (!nodes.length) {
          return {
            minX: 0,
            maxX: 0,
            minY: 0,
            maxY: 0,
          };
        }

        const bounds = {
          minX: Number.POSITIVE_INFINITY,
          maxX: Number.NEGATIVE_INFINITY,
          minY: Number.POSITIVE_INFINITY,
          maxY: Number.NEGATIVE_INFINITY,
        };

        for (let index = 0; index < nodes.length; index += 1) {
          const node = nodes[index];
          bounds.minX = Math.min(bounds.minX, node.x);
          bounds.maxX = Math.max(bounds.maxX, node.x);
          bounds.minY = Math.min(bounds.minY, node.y);
          bounds.maxY = Math.max(bounds.maxY, node.y);
        }

        return bounds;
      }

      function resolveHomeLizardLegTarget(leg, includeForwardOffset = true) {
        const spineNode = lizardState.renderPoints[leg.idx];
        if (!spineNode) {
          return { x: 0, y: 0 };
        }

        const scale = HOME_LIZARD_CONFIG.scale;
        const legReach = HOME_LIZARD_CONFIG.segmentLength * 4.2;
        const idealAngle =
          spineNode.angle +
          (Math.PI / 2.5) * leg.side +
          (leg.isFront ? 0.2 : -0.4);
        const forwardOffset = includeForwardOffset
          ? lizardState.speed * scale * (leg.isFront ? 3.5 : 4)
          : 0;

        return {
          x:
            spineNode.x +
            Math.cos(idealAngle) * legReach +
            Math.cos(spineNode.angle) * forwardOffset,
          y:
            spineNode.y +
            Math.sin(idealAngle) * legReach +
            Math.sin(spineNode.angle) * forwardOffset,
        };
      }

      function syncHomeLizardLegs() {
        lizardState.legs.forEach((leg) => {
          const target = resolveHomeLizardLegTarget(leg, false);
          leg.foot.x = target.x;
          leg.foot.y = target.y;
          leg.target.x = target.x;
          leg.target.y = target.y;
          leg.origin.x = target.x;
          leg.origin.y = target.y;
          leg.stepProgress = 1;
        });
      }

      function updateHomeLizardPhysics(targetX, targetY) {
        if (!lizardState.points.length) return;

        const head = lizardState.points[0];
        const dx = targetX - head.x;
        const dy = targetY - head.y;
        const distToTarget = Math.hypot(dx, dy);
        let targetSpeed = 0;

        if (distToTarget > 5) {
          targetSpeed = Math.min(distToTarget * 0.12, HOME_LIZARD_CONFIG.maxSpeed);
          targetSpeed += Math.sin(lizardState.walkCycle * 2) * 2.5;
          targetSpeed = Math.max(0.5, targetSpeed);
        }

        lizardState.speed += (targetSpeed - lizardState.speed) * 0.25;

        if (distToTarget > 2) {
          head.x += (dx / distToTarget) * lizardState.speed;
          head.y += (dy / distToTarget) * lizardState.speed;
          head.angle = Math.atan2(dy, dx);
        }

        lizardState.walkCycle += lizardState.speed * 0.05;
        const idleRelax = clampValue(
          1 - Math.max(lizardState.speed / 1.25, distToTarget / 42),
          0,
          1,
        );
        const currentMaxBend = lerpValue(HOME_LIZARD_CONFIG.maxBend, 0.045, idleRelax);

        for (let index = 1; index < HOME_LIZARD_CONFIG.segments; index += 1) {
          const point = lizardState.points[index];
          const previous = lizardState.points[index - 1];
          const deltaX = previous.x - point.x;
          const deltaY = previous.y - point.y;
          let targetAngle = Math.atan2(deltaY, deltaX);
          const straightenInfluence = clampValue(1 - index / (HOME_LIZARD_CONFIG.segments * 0.82), 0.2, 1);
          const relaxedAngle = lerpAngle(targetAngle, head.angle, idleRelax * straightenInfluence * 0.28);
          targetAngle = relaxedAngle;
          const diff = angleDiff(targetAngle, previous.angle);

          if (Math.abs(diff) > currentMaxBend) {
            targetAngle = previous.angle + Math.sign(diff) * currentMaxBend;
          }

          point.angle = targetAngle;
          point.x = previous.x - Math.cos(point.angle) * HOME_LIZARD_CONFIG.segmentLength;
          point.y = previous.y - Math.sin(point.angle) * HOME_LIZARD_CONFIG.segmentLength;
        }

        if (idleRelax > 0.01) {
          let axisX = 0;
          let axisY = 0;
          const rearStart = Math.max(HOME_LIZARD_CONFIG.backLegIndex - 2, 2);
          const rearEnd = Math.min(HOME_LIZARD_CONFIG.backLegIndex + 5, HOME_LIZARD_CONFIG.segments - 2);

          for (let index = rearStart; index <= rearEnd; index += 1) {
            axisX += Math.cos(lizardState.points[index].angle);
            axisY += Math.sin(lizardState.points[index].angle);
          }

          const rearAxis = Math.atan2(axisY, axisX);
          const settleStrength = clampValue((idleRelax - 0.18) / 0.82, 0, 1);
          for (let index = HOME_LIZARD_CONFIG.backLegIndex; index >= 1; index -= 1) {
            const point = lizardState.points[index];
            const previous = lizardState.points[index - 1];
            const rearInfluence = clampValue(
              1 - Math.abs(index - HOME_LIZARD_CONFIG.backLegIndex) / HOME_LIZARD_CONFIG.backLegIndex,
              0.12,
              1,
            );
            const blend = settleStrength * rearInfluence * 0.018;
            const desiredPrevX =
              point.x + Math.cos(rearAxis) * HOME_LIZARD_CONFIG.segmentLength;
            const desiredPrevY =
              point.y + Math.sin(rearAxis) * HOME_LIZARD_CONFIG.segmentLength;

            previous.x = lerpValue(previous.x, desiredPrevX, blend);
            previous.y = lerpValue(previous.y, desiredPrevY, blend);
            previous.angle = lerpAngle(previous.angle, rearAxis, blend * 0.6);
          }
        }

        for (let index = 0; index < HOME_LIZARD_CONFIG.segments; index += 1) {
          const point = lizardState.points[index];
          const renderPoint = lizardState.renderPoints[index];
          let swayFactor = 0;

          if (index <= 25) {
            swayFactor = Math.sin((index / 25) * Math.PI);
          } else {
            const tailProgress = (index - 25) / (HOME_LIZARD_CONFIG.segments - 25);
            swayFactor = tailProgress * tailProgress * 1.8;
          }

          const swayAmplitude = lizardState.speed * 0.4 * swayFactor * (1 - idleRelax * 0.94);
          const swayPhase = lizardState.walkCycle - index * 0.2;
          const swayOffset = Math.sin(swayPhase) * swayAmplitude;

          renderPoint.x = point.x + Math.cos(point.angle + Math.PI / 2) * swayOffset;
          renderPoint.y = point.y + Math.sin(point.angle + Math.PI / 2) * swayOffset;
          renderPoint.angle = point.angle;
        }

        lizardState.legs.forEach((leg) => {
          const nextTarget = resolveHomeLizardLegTarget(leg);
          const distToIdeal = Math.hypot(
            nextTarget.x - leg.foot.x,
            nextTarget.y - leg.foot.y,
          );
          const cycleMod = lizardState.walkCycle % (Math.PI * 2);
          const isMyTurn = leg.pair === 0 ? cycleMod < Math.PI : cycleMod >= Math.PI;

          if (
            leg.stepProgress >= 1 &&
            ((distToIdeal > HOME_LIZARD_CONFIG.segmentLength * 2 &&
              isMyTurn &&
              lizardState.speed > 1) ||
              distToIdeal > HOME_LIZARD_CONFIG.segmentLength * 4)
          ) {
            leg.origin.x = leg.foot.x;
            leg.origin.y = leg.foot.y;
            leg.target.x = nextTarget.x;
            leg.target.y = nextTarget.y;
            leg.stepProgress = 0;
          }

          if (leg.stepProgress < 1) {
            leg.stepProgress += 0.18;
            if (leg.stepProgress > 1) leg.stepProgress = 1;

            const ease = easeOutCubic(leg.stepProgress);
            leg.foot.x = leg.origin.x + (leg.target.x - leg.origin.x) * ease;
            leg.foot.y = leg.origin.y + (leg.target.y - leg.origin.y) * ease;
          }
        });

        lizardState.critter = head;
        lizardState.nodes = getHomeLizardNodes();
      }

      function drawHomeLizardLegs() {
        const scale = HOME_LIZARD_CONFIG.scale;
        homeLizardContext.lineWidth = HOME_LIZARD_CONFIG.lineWidth;

        lizardState.legs.forEach((leg) => {
          const spineNode = lizardState.renderPoints[leg.idx];
          if (!spineNode) return;

          const shoulderWidth = HOME_LIZARD_CONFIG.segmentLength * 1.5;
          const shoulderAngle = spineNode.angle + (Math.PI / 2) * leg.side;
          const shoulderX = spineNode.x + Math.cos(shoulderAngle) * shoulderWidth;
          const shoulderY = spineNode.y + Math.sin(shoulderAngle) * shoulderWidth;
          const footX = leg.foot.x;
          const footY = leg.foot.y;
          const dx = footX - shoulderX;
          const dy = footY - shoulderY;
          let dist = Math.max(0.001, Math.hypot(dx, dy));
          const upperLength =
            HOME_LIZARD_CONFIG.segmentLength * (leg.isFront ? 2.5 : 3);
          const lowerLength =
            HOME_LIZARD_CONFIG.segmentLength * (leg.isFront ? 2.5 : 3);

          if (dist >= upperLength + lowerLength) {
            dist = upperLength + lowerLength - 0.01;
          }

          const angleToFoot = Math.atan2(dy, dx);
          const cosAlpha =
            (upperLength * upperLength +
              dist * dist -
              lowerLength * lowerLength) /
            (2 * upperLength * dist);
          const alpha = Math.acos(Math.max(-1, Math.min(1, cosAlpha)));
          const jointAngle = angleToFoot + leg.side * alpha;
          const jointX = shoulderX + Math.cos(jointAngle) * upperLength;
          const jointY = shoulderY + Math.sin(jointAngle) * upperLength;

          homeLizardContext.beginPath();
          homeLizardContext.moveTo(spineNode.x, spineNode.y);
          homeLizardContext.lineTo(shoulderX, shoulderY);
          homeLizardContext.lineTo(jointX, jointY);
          homeLizardContext.lineTo(footX, footY);
          homeLizardContext.stroke();

          const toeLength = 6 * scale;
          const footDirection = spineNode.angle + (Math.PI / 8) * leg.side;
          homeLizardContext.beginPath();
          for (let toeIndex = -1; toeIndex <= 1; toeIndex += 1) {
            const toeAngle = footDirection + toeIndex * 0.4;
            homeLizardContext.moveTo(footX, footY);
            homeLizardContext.lineTo(
              footX + Math.cos(toeAngle) * toeLength,
              footY + Math.sin(toeAngle) * toeLength,
            );
          }
          homeLizardContext.stroke();
        });
      }

      function drawHomeLizardSpineAndRibs() {
        const scale = HOME_LIZARD_CONFIG.scale;
        homeLizardContext.lineWidth = HOME_LIZARD_CONFIG.lineWidth;
        homeLizardContext.beginPath();
        homeLizardContext.moveTo(
          lizardState.renderPoints[0].x,
          lizardState.renderPoints[0].y,
        );

        for (let index = 1; index < HOME_LIZARD_CONFIG.segments - 1; index += 1) {
          const point = lizardState.renderPoints[index];
          const nextPoint = lizardState.renderPoints[index + 1];
          const midX = (point.x + nextPoint.x) / 2;
          const midY = (point.y + nextPoint.y) / 2;
          homeLizardContext.quadraticCurveTo(point.x, point.y, midX, midY);
        }

        const tailEnd = lizardState.renderPoints[HOME_LIZARD_CONFIG.segments - 1];
        homeLizardContext.lineTo(tailEnd.x, tailEnd.y);
        homeLizardContext.stroke();

        for (let index = 3; index < 28; index += 1) {
          const point = lizardState.renderPoints[index];

          if (index >= 6 && index <= 23) {
            const ribRatio = Math.sin(((index - 5) / 19) * Math.PI);
            const ribWidth = ribRatio * 18 * scale;
            const sweep = 0.35;

            homeLizardContext.beginPath();
            homeLizardContext.moveTo(point.x, point.y);
            homeLizardContext.quadraticCurveTo(
              point.x + Math.cos(point.angle - Math.PI / 2 - sweep) * ribWidth * 0.8,
              point.y + Math.sin(point.angle - Math.PI / 2 - sweep) * ribWidth * 0.8,
              point.x + Math.cos(point.angle - Math.PI / 2) * ribWidth,
              point.y + Math.sin(point.angle - Math.PI / 2) * ribWidth,
            );
            homeLizardContext.stroke();

            homeLizardContext.beginPath();
            homeLizardContext.moveTo(point.x, point.y);
            homeLizardContext.quadraticCurveTo(
              point.x + Math.cos(point.angle + Math.PI / 2 + sweep) * ribWidth * 0.8,
              point.y + Math.sin(point.angle + Math.PI / 2 + sweep) * ribWidth * 0.8,
              point.x + Math.cos(point.angle + Math.PI / 2) * ribWidth,
              point.y + Math.sin(point.angle + Math.PI / 2) * ribWidth,
            );
            homeLizardContext.stroke();
          } else {
            const vertebraWidth = (index < 6 ? 3 : 4) * scale;
            homeLizardContext.beginPath();
            homeLizardContext.moveTo(
              point.x + Math.cos(point.angle - Math.PI / 2) * vertebraWidth,
              point.y + Math.sin(point.angle - Math.PI / 2) * vertebraWidth,
            );
            homeLizardContext.lineTo(
              point.x + Math.cos(point.angle + Math.PI / 2) * vertebraWidth,
              point.y + Math.sin(point.angle + Math.PI / 2) * vertebraWidth,
            );
            homeLizardContext.stroke();
          }
        }
      }

      function drawHomeLizardTail() {
        const scale = HOME_LIZARD_CONFIG.scale;
        homeLizardContext.lineWidth = HOME_LIZARD_CONFIG.lineWidth;

        for (let index = 28; index < HOME_LIZARD_CONFIG.segments; index += 2) {
          const point = lizardState.renderPoints[index];
          const taperRatio =
            1 - (index - 28) / (HOME_LIZARD_CONFIG.segments - 28);
          const tailWidth = taperRatio * 5.5 * scale;

          homeLizardContext.beginPath();
          homeLizardContext.moveTo(
            point.x + Math.cos(point.angle - Math.PI / 2) * tailWidth,
            point.y + Math.sin(point.angle - Math.PI / 2) * tailWidth,
          );
          homeLizardContext.lineTo(
            point.x + Math.cos(point.angle + Math.PI / 2) * tailWidth,
            point.y + Math.sin(point.angle + Math.PI / 2) * tailWidth,
          );
          homeLizardContext.stroke();
        }
      }

      function drawHomeLizardHead() {
        const scale = HOME_LIZARD_CONFIG.scale;
        const head = lizardState.renderPoints[0];
        const neck = lizardState.renderPoints[2];
        const angle = head.angle;
        const snout = {
          x: head.x + Math.cos(angle) * 9 * scale,
          y: head.y + Math.sin(angle) * 9 * scale,
        };
        const skullBack = {
          x: neck.x - Math.cos(angle) * 2 * scale,
          y: neck.y - Math.sin(angle) * 2 * scale,
        };
        const leftJaw = {
          x: neck.x + Math.cos(angle - Math.PI / 2) * 7 * scale,
          y: neck.y + Math.sin(angle - Math.PI / 2) * 7 * scale,
        };
        const rightJaw = {
          x: neck.x + Math.cos(angle + Math.PI / 2) * 7 * scale,
          y: neck.y + Math.sin(angle + Math.PI / 2) * 7 * scale,
        };
        const leftEye = {
          x: head.x + Math.cos(angle - Math.PI / 2) * 9 * scale,
          y: head.y + Math.sin(angle - Math.PI / 2) * 9 * scale,
        };
        const rightEye = {
          x: head.x + Math.cos(angle + Math.PI / 2) * 9 * scale,
          y: head.y + Math.sin(angle + Math.PI / 2) * 9 * scale,
        };

        homeLizardContext.beginPath();
        homeLizardContext.moveTo(snout.x, snout.y);
        homeLizardContext.lineTo(leftEye.x, leftEye.y);
        homeLizardContext.lineTo(leftJaw.x, leftJaw.y);
        homeLizardContext.lineTo(skullBack.x, skullBack.y);
        homeLizardContext.lineTo(rightJaw.x, rightJaw.y);
        homeLizardContext.lineTo(rightEye.x, rightEye.y);
        homeLizardContext.closePath();
        homeLizardContext.stroke();

        const eyeOffsetX = Math.cos(angle - Math.PI / 2) * 4.5 * scale;
        const eyeOffsetY = Math.sin(angle - Math.PI / 2) * 4.5 * scale;

        homeLizardContext.beginPath();
        homeLizardContext.arc(
          head.x + eyeOffsetX,
          head.y + eyeOffsetY,
          2.5 * scale,
          0,
          Math.PI * 2,
        );
        homeLizardContext.stroke();

        homeLizardContext.beginPath();
        homeLizardContext.arc(
          head.x - eyeOffsetX,
          head.y - eyeOffsetY,
          2.5 * scale,
          0,
          Math.PI * 2,
        );
        homeLizardContext.stroke();

        homeLizardContext.beginPath();
        homeLizardContext.moveTo(snout.x, snout.y);
        homeLizardContext.lineTo(skullBack.x, skullBack.y);
        homeLizardContext.stroke();
      }

      function drawHomeLizardSkeleton() {
        if (lizardState.renderPoints.length < 3) return;
        drawHomeLizardLegs();
        drawHomeLizardSpineAndRibs();
        drawHomeLizardTail();
        drawHomeLizardHead();
      }

      function initializeLizardCanvas() {
        resizeLizardCanvas();
        startLizardLoop();
      }

      function startLizardLoop() {
        if (lizardState.running) return;
        lizardState.running = true;
        lizardState.lastFrameAt = 0;
        lizardState.rafId = window.requestAnimationFrame(runLizardLoop);
      }

      function stopLizardLoop() {
        if (!lizardState.running) return;
        window.cancelAnimationFrame(lizardState.rafId);
        lizardState.rafId = 0;
        lizardState.lastFrameAt = 0;
        lizardState.running = false;
      }

      function shouldKeepLizardLoopRunning() {
        return !document.hidden;
      }

      function handleVisibilityChange() {
        if (document.hidden) {
          stopLizardLoop();
          return;
        }

        if (shouldKeepLizardLoopRunning()) {
          startLizardLoop();
        }
      }

      function resizeLizardCanvas() {
        const dpr = Math.min(window.devicePixelRatio || 1, lizardState.maxDpr);
        lizardState.width = window.innerWidth;
        lizardState.height = window.innerHeight;
        lizardState.dpr = dpr;
        homeLizardCanvas.width = Math.round(lizardState.width * dpr);
        homeLizardCanvas.height = Math.round(lizardState.height * dpr);
        homeLizardCanvas.style.width = `${lizardState.width}px`;
        homeLizardCanvas.style.height = `${lizardState.height}px`;
        homeLizardContext.setTransform(dpr, 0, 0, dpr, 0, 0);
        updateHomeLizardAnchors();
        if (!lizardState.input.mouse.x && !lizardState.input.mouse.y) {
          lizardState.input.mouse.x = lizardState.anchor.x;
          lizardState.input.mouse.y = lizardState.anchor.y;
        }
        lizardState.followTarget.x = lizardState.input.mouse.x || lizardState.anchor.x;
        lizardState.followTarget.y = lizardState.input.mouse.y || lizardState.anchor.y;

        setupLizard();
        startLizardLoop();
      }

      function handleLizardPointerMove(event) {
        lizardState.input.mouse.x = event.clientX;
        lizardState.input.mouse.y = event.clientY;
        lizardState.hasPointerTarget = true;
      }

      function handleLizardPointerDown(event) {
        lizardState.input.mouse.x = event.clientX;
        lizardState.input.mouse.y = event.clientY;
        lizardState.hasPointerTarget = true;
        if (event.button === 0) lizardState.input.mouse.left = true;
        if (event.button === 1) lizardState.input.mouse.middle = true;
        if (event.button === 2) lizardState.input.mouse.right = true;
      }

      function handleLizardPointerUp(event) {
        if (event.button === 0) lizardState.input.mouse.left = false;
        if (event.button === 1) lizardState.input.mouse.middle = false;
        if (event.button === 2) lizardState.input.mouse.right = false;
      }

      function handleLizardTouch(event) {
        const touch = event.touches[0];
        if (!touch) return;
        lizardState.input.mouse.x = touch.clientX;
        lizardState.input.mouse.y = touch.clientY;
        lizardState.hasPointerTarget = true;
      }

      function runLizardLoop(timestamp) {
        if (
          lizardState.lastFrameAt &&
          timestamp - lizardState.lastFrameAt < lizardState.frameInterval
        ) {
          lizardState.rafId = window.requestAnimationFrame(runLizardLoop);
          return;
        }

        lizardState.lastFrameAt = timestamp;
        try {
          drawHomeLizard();
        } catch (error) {
          console.error("Home lizard loop failed:", error);
          state.lizardSignalEffectEnabled = false;
          restoreNavEffectText();
        }

        if (!shouldKeepLizardLoopRunning()) {
          stopLizardLoop();
          return;
        }

        lizardState.rafId = window.requestAnimationFrame(runLizardLoop);
      }

      function drawHomeLizard() {
        if (!homeLizardContext) return;

        homeLizardContext.clearRect(0, 0, lizardState.width, lizardState.height);
        if (!lizardState.renderVisible || !lizardState.critter) {
          updateLizardTextFracture();
          return;
        }

        lizardState.time += 1;
        let targetX = lizardState.input.mouse.x;
        let targetY = lizardState.input.mouse.y;
        let exitProgress = 0;

        if (lizardState.mode === "entering") {
          targetX = lizardState.anchor.x;
          targetY = lizardState.anchor.y;
        } else if (lizardState.mode === "exiting") {
          exitProgress = lizardState.exitStartedAt
            ? Math.min(1, (performance.now() - lizardState.exitStartedAt) / lizardState.exitTravelMs)
            : 1;
          const eased = 1 - (1 - exitProgress) ** 3;
          const arcLift = Math.sin(eased * Math.PI) * Math.max(20, lizardState.height * 0.02);
          targetX = lerpValue(lizardState.exitOrigin.x, lizardState.parked.x, eased);
          targetY = lerpValue(lizardState.exitOrigin.y, lizardState.parked.y, eased) - arcLift;
        } else if (lizardState.mode === "parked") {
          targetX = lizardState.parked.x;
          targetY = lizardState.parked.y;
        }

        if (lizardState.mode === "active" && shouldUseHomeLizardCenterFallback()) {
          const centerPoint = getHomeLizardCenterPoint();
          targetX = centerPoint.x;
          targetY = centerPoint.y;
        }

        if (lizardState.mode === "active") {
          const followDx = targetX - lizardState.followTarget.x;
          const followDy = targetY - lizardState.followTarget.y;
          const followDistance = Math.hypot(followDx, followDy);
          const followEase = clampValue(0.014 + followDistance / 2400, 0.014, 0.045);
          lizardState.followTarget.x += followDx * followEase;
          lizardState.followTarget.y += followDy * followEase;
          targetX = lizardState.followTarget.x;
          targetY = lizardState.followTarget.y;
        } else {
          lizardState.followTarget.x = targetX;
          lizardState.followTarget.y = targetY;
        }

        const simulationSteps =
          lizardState.mode === "entering"
            ? 3
            : lizardState.mode === "exiting" && exitProgress > 0.58
              ? 2
              : 1;

        for (let stepIndex = 0; stepIndex < simulationSteps; stepIndex += 1) {
          updateHomeLizardPhysics(targetX, targetY);
        }

        homeLizardContext.save();
        homeLizardContext.lineCap = "round";
        homeLizardContext.lineJoin = "round";
        homeLizardContext.strokeStyle = HOME_LIZARD_CONFIG.lineColor;
        drawHomeLizardSkeleton();
        homeLizardContext.restore();

        const distanceToGoal = Math.hypot(
          (lizardState.critter?.x ?? targetX) - targetX,
          (lizardState.critter?.y ?? targetY) - targetY,
        );
        const bounds = measureLizardBounds();

        if (lizardState.mode === "entering" && distanceToGoal < 42) {
          lizardState.mode = "active";
        }

        if (
          lizardState.mode === "exiting" &&
          (bounds.maxY < -56 || (exitProgress >= 1 && distanceToGoal < 28))
        ) {
          lizardState.mode = "parked";
          lizardState.renderVisible = false;
          lizardState.exitStartedAt = 0;
          homeLizardStage.classList.remove("is-visible");
        }

        updateLizardTextFracture();
      }

      function setupLizard() {
        const startPoint =
          lizardState.points[0] ||
          (lizardState.mode === "active" ? lizardState.anchor : lizardState.parked);
        const startAngle = -Math.PI / 2;

        lizardState.points = Array.from(
          { length: HOME_LIZARD_CONFIG.segments },
          (_, index) => ({
            x: startPoint.x,
            y: startPoint.y + index * HOME_LIZARD_CONFIG.segmentLength,
            angle: startAngle,
          }),
        );
        lizardState.renderPoints = Array.from(
          { length: HOME_LIZARD_CONFIG.segments },
          (_, index) => ({
            x: startPoint.x,
            y: startPoint.y + index * HOME_LIZARD_CONFIG.segmentLength,
            angle: startAngle,
          }),
        );
        lizardState.legs = [
          {
            idx: HOME_LIZARD_CONFIG.frontLegIndex,
            side: -1,
            isFront: true,
            pair: 0,
          },
          {
            idx: HOME_LIZARD_CONFIG.frontLegIndex,
            side: 1,
            isFront: true,
            pair: 1,
          },
          {
            idx: HOME_LIZARD_CONFIG.backLegIndex,
            side: -1,
            isFront: false,
            pair: 1,
          },
          {
            idx: HOME_LIZARD_CONFIG.backLegIndex,
            side: 1,
            isFront: false,
            pair: 0,
          },
        ].map((leg) => ({
          ...leg,
          foot: { x: startPoint.x, y: startPoint.y },
          target: { x: startPoint.x, y: startPoint.y },
          origin: { x: startPoint.x, y: startPoint.y },
          stepProgress: 1,
        }));

        lizardState.speed = 0;
        lizardState.walkCycle = 0;
        lizardState.critter = lizardState.points[0];
        lizardState.followTarget.x = startPoint.x;
        lizardState.followTarget.y = startPoint.y;
        lizardState.nodes = getHomeLizardNodes();
        syncHomeLizardLegs();
      }

      initializeLizardCanvas();
      resizeContactDinoCanvas();
      contactDinoState.rafId = window.requestAnimationFrame(runContactDinoLoop);
      syncNavigationFromHash();

      function renderFrameToSvg(frame) {
        const needsRebuild =
          state.frameWidth !== frame.width ||
          state.frameHeight !== frame.height ||
          state.dotNodes.length !== frame.dots.length;

        if (needsRebuild) {
          rebuildSvgFrame(frame);
          return;
        }

        for (let index = 0; index < frame.dots.length; index += 1) {
          state.dotNodes[index].setAttribute("r", String(frame.dots[index].r));
          state.dotNodes[index].setAttribute("fill", frame.dots[index].fill);
        }
      }

      function rebuildSvgFrame(frame) {
        state.frameWidth = frame.width;
        state.frameHeight = frame.height;
        screenSvg.setAttribute("viewBox", `0 0 ${frame.width} ${frame.height}`);

        const fragment = document.createDocumentFragment();
        fragment.append(createSvgRect(frame.width, frame.height));

        state.dotNodes = frame.dots.map((dot) => {
          const circle = document.createElementNS(SVG_NS, "circle");
          circle.setAttribute("cx", String(dot.cx));
          circle.setAttribute("cy", String(dot.cy));
          circle.setAttribute("r", String(dot.r));
          circle.setAttribute("fill", dot.fill);
          fragment.append(circle);
          return circle;
        });

        screenSvg.replaceChildren(fragment);
      }

      function updateNavButtonContrast(frame) {
        if (!frame) {
          navButtons.forEach((button) => button.setAttribute("data-contrast", "dark"));
          return;
        }

        navButtons.forEach((button) => {
          const brightness = sampleBrightnessBehindElement(button, frame);
          const currentContrast = button.getAttribute("data-contrast") || "dark";
          const nextContrast = getStableContrastMode(brightness, currentContrast);
          button.setAttribute("data-contrast", nextContrast);
        });
      }

      function updateProjectNodeContrast(frame) {
        if (!state.projectNodes.length) return;

        if (!frame) {
          state.projectNodes.forEach((node) => node.setAttribute("data-contrast", "dark"));
          state.projectContrastSampleAt = 0;
          return;
        }

        if (state.activeSection !== "projects") return;

        const now = performance.now();
        if (now - state.projectContrastSampleAt < state.projectContrastInterval) return;

        state.projectNodes.forEach((node) => {
          const brightness = sampleBrightnessBehindElement(node, frame);
          const currentContrast = node.getAttribute("data-contrast") || "dark";
          const nextContrast = getStableContrastMode(brightness, currentContrast);
          node.setAttribute("data-contrast", nextContrast);
        });
        state.projectContrastSampleAt = now;
      }

      function sampleBrightnessBehindElement(element, frame) {
        const rect = element.getBoundingClientRect();
        const samplePoints = [
          [rect.left + rect.width * 0.5, rect.top + rect.height * 0.5],
          [rect.left + rect.width * 0.2, rect.top + rect.height * 0.5],
          [rect.left + rect.width * 0.8, rect.top + rect.height * 0.5],
        ];

        let total = 0;
        let count = 0;

        for (const [clientX, clientY] of samplePoints) {
          const mapped = mapViewportPointToFrame(clientX, clientY, frame.width, frame.height);
          if (!mapped) continue;

          total += readBrightnessGrid(frame, mapped.x, mapped.y);
          count += 1;
        }

        return count > 0 ? total / count : 255;
      }

      function mapViewportPointToFrame(clientX, clientY, frameWidth, frameHeight) {
        const viewportWidth = window.innerWidth;
        const viewportHeight = window.innerHeight;
        const sourceAspect = frameWidth / frameHeight;
        const viewportAspect = viewportWidth / viewportHeight;

        let drawWidth = viewportWidth;
        let drawHeight = viewportHeight;
        let offsetX = 0;
        let offsetY = 0;

        if (sourceAspect > viewportAspect) {
          drawHeight = viewportHeight;
          drawWidth = drawHeight * sourceAspect;
          offsetX = (viewportWidth - drawWidth) / 2;
        } else {
          drawWidth = viewportWidth;
          drawHeight = drawWidth / sourceAspect;
          offsetY = (viewportHeight - drawHeight) / 2;
        }

        const frameX = ((clientX - offsetX) / drawWidth) * frameWidth;
        const frameY = ((clientY - offsetY) / drawHeight) * frameHeight;

        if (frameX < 0 || frameX > frameWidth || frameY < 0 || frameY > frameHeight) {
          return null;
        }

        return { x: frameX, y: frameY };
      }

      function readBrightnessGrid(frame, x, y) {
        const col = clamp(Math.floor(x / frame.cellSize), 0, frame.cols - 1);
        const row = clamp(Math.floor(y / frame.cellSize), 0, frame.rows - 1);
        const index = row * frame.cols + col;
        return frame.brightnessGrid[index] ?? 255;
      }

      function getStableContrastMode(brightness, currentContrast) {
        const lowerThreshold = 112;
        const upperThreshold = 168;

        if (currentContrast === "light") {
          return brightness > upperThreshold ? "dark" : "light";
        }

        return brightness < lowerThreshold ? "light" : "dark";
      }

      function initializeProjectDial() {
        state.projectNodes = PROJECT_RING.map((entry) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "projects-node";
          button.dataset.ringIndex = String(entry.ringIndex);
          if (entry.homepage) {
            button.setAttribute("data-has-homepage", "true");
            button.title = entry.homepage;
          }
          if (entry.sticker) {
            button.setAttribute("data-has-sticker", "true");
          }
          button.innerHTML = `
            <span class="projects-node-title">${entry.title}</span>
          `;
          button.addEventListener("pointerdown", (event) => {
            state.pendingProjectRingIndex = entry.ringIndex;
            state.pendingProjectPointerId = event.pointerId;
          });
          button.addEventListener("click", (event) => {
            if (state.activeSection !== "projects") return;
            if (event.detail !== 0) return;
            activateProjectEntry(entry);
          });
          button._dialRenderState = {
            left: "",
            top: "",
            opacity: "",
            transform: "",
            zIndex: "",
            active: false,
          };
          projectsDial.append(button);
          return button;
        });

        projectsDial.addEventListener("pointerdown", handleDialPointerDown);
        projectsDial.addEventListener("pointermove", handleDialPointerMove);
        projectsDial.addEventListener("pointerup", handleDialPointerUp);
        projectsDial.addEventListener("pointercancel", handleDialPointerUp);
        projectsDial.addEventListener("lostpointercapture", handleDialPointerUp);
        projectsOrbit.addEventListener("wheel", handleDialWheel, { passive: false });
        projectsDial.addEventListener("wheel", handleDialWheel, { passive: false });
        projectsDial.addEventListener("keydown", handleDialKeydown);

        updateProjectDialLayout();
        updateProjectDial(true);
      }

      function handleDialPointerDown(event) {
        if (state.activeSection !== "projects") return;

        const projectButton = event.target.closest(".projects-node");
        state.pendingProjectRingIndex = projectButton
          ? Number.parseInt(projectButton.dataset.ringIndex || "-1", 10)
          : -1;
        state.pendingProjectPointerId = event.pointerId ?? null;
        markProjectDialInteraction();
        cancelProjectDialTween();
        projectsOrbit.classList.remove("is-auto-rotating");
        state.isDialDragging = true;
        state.didDialDrag = false;
        state.dragLastX = event.clientX;
