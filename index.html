<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halftone Background</title>
    <style>
      @import url("https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css");

      :root {
        color-scheme: dark;
        --nav-dark: rgba(0, 0, 0, 0.62);
        --nav-dark-active: #000000;
        --nav-dark-hover: rgba(0, 0, 0, 0.84);
        --nav-light: rgba(255, 255, 255, 0.72);
        --nav-light-active: #ffffff;
        --nav-light-hover: rgba(255, 255, 255, 0.92);
        --type-shadow-dark:
          0 0.015em 0 rgba(255, 255, 255, 0.3),
          0 0.04em 0.18em rgba(255, 255, 255, 0.08);
        --type-shadow-light:
          0 0.015em 0 rgba(0, 0, 0, 0.28),
          0 0.04em 0.18em rgba(0, 0, 0, 0.08);
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #fff;
      }

      body {
        position: relative;
        font-family: "Pretendard", "Helvetica Neue", "Arial Nova", Arial, sans-serif;
        font-kerning: normal;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-feature-settings: "kern" 1, "liga" 1, "clig" 1;
        font-synthesis: none;
      }

      .nav-button,
      .contact-line,
      .contact-kicker,
      .projects-node-title {
        font-kerning: normal;
        text-rendering: geometricPrecision;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-feature-settings: "kern" 1, "liga" 1, "clig" 1;
      }

      svg {
        position: fixed;
        inset: 0;
        display: block;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
      }

      .site-nav {
        position: fixed;
        top: 44px;
        left: 48px;
        z-index: 5;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 26px;
      }

      .nav-button {
        border: 0;
        padding: 0;
        background: transparent;
        color: var(--nav-dark);
        font: inherit;
        font-size: clamp(1.6rem, 2.1vw, 2.2rem);
        font-weight: 450;
        letter-spacing: -0.045em;
        line-height: 0.92;
        cursor: pointer;
        transition: color 180ms ease, transform 180ms ease, opacity 180ms ease;
        text-shadow: var(--type-shadow-dark);
      }

      .nav-button-label {
        display: inline-flex;
        align-items: center;
        pointer-events: none;
      }

      .nav-button-char {
        display: inline-block;
        transform: translate3d(0, 0, 0) rotate(0deg);
        transform-origin: 50% 60%;
        pointer-events: none;
        user-select: none;
        transition:
          transform 240ms cubic-bezier(0.22, 1, 0.36, 1),
          opacity 220ms ease,
          filter 220ms ease;
      }

      .nav-button-char.is-space {
        width: 0.28em;
      }

      .nav-button.is-fractured .nav-button-char {
        transform:
          translate3d(var(--fracture-x, 0px), var(--fracture-y, 0px), 0)
          rotate(var(--fracture-rotate, 0deg));
        opacity: var(--fracture-opacity, 1);
        filter: blur(var(--fracture-blur, 0px));
      }

      .nav-button:hover,
      .nav-button:focus-visible {
        transform: translateX(4px);
        outline: none;
      }

      .nav-button[data-contrast="dark"] {
        color: var(--nav-dark);
      }

      .nav-button[data-contrast="dark"]:hover,
      .nav-button[data-contrast="dark"]:focus-visible {
        color: var(--nav-dark-hover);
      }

      .nav-button[data-contrast="dark"][aria-current="page"] {
        color: var(--nav-dark-active);
      }

      .nav-button[data-contrast="light"] {
        color: var(--nav-light);
      }

      .nav-button[data-contrast="light"]:hover,
      .nav-button[data-contrast="light"]:focus-visible {
        color: var(--nav-light-hover);
      }

      .nav-button[data-contrast="light"][aria-current="page"] {
        color: var(--nav-light-active);
      }

      .projects-orbit {
        position: fixed;
        inset: 0;
        z-index: 1;
        opacity: 0;
        pointer-events: none;
        transition: opacity 260ms ease;
      }

      .projects-orbit.is-visible {
        opacity: 1;
        pointer-events: auto;
      }

      .contact-panel {
        position: fixed;
        right: 48px;
        top: 49%;
        z-index: 3;
        display: grid;
        justify-items: end;
        text-align: right;
        gap: 18px;
        max-width: min(620px, calc(100vw - 96px));
        opacity: 0;
        pointer-events: none;
        transform: translate3d(-96px, -50%, 0);
        transition:
          opacity 260ms ease,
          transform 320ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .about-panel {
        position: fixed;
        inset: 118px 48px 36px 48px;
        z-index: 3;
        box-sizing: border-box;
        display: grid;
        align-content: start;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        column-gap: clamp(36px, 6vw, 112px);
        row-gap: 18px;
        padding-left: clamp(520px, 40vw, 980px);
        overflow: auto;
        overscroll-behavior: contain;
        scrollbar-gutter: stable;
        opacity: 0;
        pointer-events: none;
        transform: none;
        transition: opacity 200ms ease;
      }

      .about-panel.is-visible {
        opacity: 1;
        pointer-events: auto;
      }

      .about-panel .contact-line,
      .about-panel .contact-kicker {
        width: min(620px, 100%);
        max-width: min(620px, 100%);
      }

      .about-panel .about-item.is-center {
        grid-column: 1;
        justify-self: start;
        text-align: left;
      }

      .about-panel .about-item.is-right {
        grid-column: 2;
        justify-self: start;
        text-align: left;
      }

      .contact-dino-stage {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 2;
        height: 350px;
        opacity: 0;
        pointer-events: none;
        transform: translate3d(-120px, 0, 0);
        transition:
          opacity 260ms ease,
          transform 360ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .contact-dino-stage.is-visible {
        opacity: 1;
        pointer-events: auto;
        transform: translate3d(0, 0, 0);
      }

      .contact-dino-canvas {
        display: block;
        width: 100vw;
        height: 100%;
        border: 0;
        touch-action: manipulation;
      }

      .contact-panel.is-visible {
        opacity: 1;
        pointer-events: auto;
        transform: translate3d(0, -50%, 0);
      }

      .contact-line {
        color: rgba(17, 17, 17, 0.9);
        text-decoration: none;
        font-family: "Pretendard", "Helvetica Neue", "Arial Nova", Arial, sans-serif;
        font-size: clamp(1.38rem, 2.6vw, 2.7rem);
        font-weight: 500;
        line-height: 0.95;
        letter-spacing: -0.03em;
        text-shadow: var(--type-shadow-dark);
      }

      .contact-line.is-link:hover,
      .contact-line.is-link:focus-visible {
        outline: none;
        text-decoration: underline;
        text-underline-offset: 0.16em;
      }

      .contact-kicker {
        color: rgba(17, 17, 17, 0.9);
        font-family: "Pretendard", "Helvetica Neue", "Arial Nova", Arial, sans-serif;
        font-size: clamp(1.38rem, 2.6vw, 2.7rem);
        font-weight: 700;
        line-height: 0.95;
        letter-spacing: -0.025em;
        text-transform: uppercase;
        text-shadow: var(--type-shadow-dark);
      }

      .contact-line + .contact-kicker {
        margin-top: 0.38em;
      }

      .contact-text-label {
        display: inline-block;
        width: max-content;
        max-width: 100%;
        margin-left: auto;
        white-space: nowrap;
        font-family: "Pretendard", "Helvetica Neue", "Arial Nova", Arial, sans-serif;
        pointer-events: none;
      }

      .contact-text-char {
        display: inline-block;
        transform: translate3d(0, 0, 0) rotate(0deg) scale(1);
        transform-origin: 50% 60%;
        pointer-events: none;
        user-select: none;
        transition:
          transform 280ms cubic-bezier(0.22, 1, 0.36, 1),
          opacity 240ms ease,
          filter 240ms ease;
      }

      .contact-text-char + .contact-text-char {
        margin-left: -0.028em;
      }

      .contact-text-char.is-space {
        width: 0.28em;
        margin-left: 0;
      }

      .contact-panel.is-blasted .contact-text-char {
        transform:
          translate3d(var(--contact-blast-x, 0px), var(--contact-blast-y, 0px), 0)
          rotate(var(--contact-blast-rotate, 0deg))
          scale(var(--contact-blast-scale, 1));
        opacity: var(--contact-blast-opacity, 1);
        filter: blur(var(--contact-blast-blur, 0px));
      }

      .help-text {
        position: fixed;
        bottom: 24px;
        left: 48px;
        color: rgba(17, 17, 17, 0.4);
        font-size: 0.9rem;
        font-weight: 500;
        z-index: 10;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.5s ease;
      }

      .help-text.is-visible {
        opacity: 1;
      }

      .contact-runner-scoreboard {
        display: grid;
        justify-items: end;
        width: max-content;
        max-width: 100%;
        margin-top: 6px;
        margin-left: auto;
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease;
      }

      .contact-runner-scoreboard.is-visible {
        opacity: 1;
      }

      .contact-runner-score-canvas {
        display: block;
        width: 154px;
        height: 16px;
      }

      .contact-runner-overlay {
        position: fixed;
        left: 50%;
        bottom: 118px;
        z-index: 10;
        display: grid;
        justify-items: center;
        gap: 12px;
        opacity: 0;
        pointer-events: none;
        transform: translateX(-50%);
        transition: opacity 180ms ease;
      }

      .contact-runner-overlay.is-visible {
        opacity: 1;
        pointer-events: auto;
      }

      .contact-runner-gameover-canvas {
        display: block;
        width: 191px;
        height: 11px;
      }

      .contact-runner-restart {
        border: 0;
        padding: 0;
        background: transparent;
        cursor: pointer;
      }

      .contact-runner-restart:focus-visible {
        outline: 2px solid rgba(17, 17, 17, 0.28);
        outline-offset: 6px;
      }

      .contact-runner-restart-canvas {
        display: block;
        width: 36px;
        height: 32px;
      }

      .projects-orbit:not(.is-visible) .projects-node,
      .projects-orbit:not(.is-visible) .projects-dial {
        pointer-events: none;
      }

      .projects-dial {
        position: absolute;
        top: 50%;
        right: 0;
        width: min(112vh, 118vw);
        aspect-ratio: 1;
        transform: translate(50%, -50%);
        border-radius: 50%;
        touch-action: none;
        cursor: grab;
        outline: none;
      }

      .projects-orbit.is-dragging .projects-dial {
        cursor: grabbing;
      }

      .projects-node {
        position: absolute;
        width: max-content;
        max-width: min(28vw, 360px);
        padding: 0.18em 0.3em;
        border: 0;
        background: transparent;
        color: #111111;
        text-align: right;
        transform-origin: 100% 50%;
        cursor: pointer;
        touch-action: manipulation;
        backface-visibility: hidden;
        -webkit-font-smoothing: antialiased;
        will-change: transform, opacity;
        transition:
          left 360ms cubic-bezier(0.22, 1, 0.36, 1),
          top 360ms cubic-bezier(0.22, 1, 0.36, 1),
          transform 360ms cubic-bezier(0.22, 1, 0.36, 1),
          opacity 220ms ease;
      }

      .projects-orbit.is-dragging .projects-node {
        transition: none;
      }

      .projects-orbit.is-wheel-scrolling .projects-node {
        transition: none;
      }

      .projects-orbit.is-auto-rotating .projects-node {
        transition: none;
      }

      .projects-node:hover,
      .projects-node:focus-visible {
        outline: none;
      }

      .projects-node.is-active {
        opacity: 1;
      }

      .projects-node[data-contrast="dark"] {
        color: rgba(17, 17, 17, 0.9);
        text-shadow: var(--type-shadow-dark);
      }

      .projects-node[data-contrast="light"] {
        color: rgba(255, 255, 255, 0.94);
        text-shadow: var(--type-shadow-light);
      }

      .projects-node-title {
        display: block;
        font-size: clamp(1.32rem, 2.15vw, 2.72rem);
        font-weight: 560;
        letter-spacing: -0.085em;
        line-height: 0.88;
        white-space: nowrap;
        pointer-events: none;
        user-select: none;
      }

      .home-lizard-stage {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        opacity: 0;
        mix-blend-mode: difference;
        transition: opacity 220ms ease;
      }

      .home-lizard-stage.is-visible {
        opacity: 1;
      }

      .home-lizard-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .sticker-stage {
        position: fixed;
        inset: 0;
        z-index: 4;
        display: grid;
        place-items: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 180ms ease;
      }

      .sticker-stage.is-active {
        opacity: 1;
        pointer-events: auto;
      }

      .sticker-burst {
        position: relative;
        perspective: 1400px;
        width: min(40vw, 440px);
        aspect-ratio: 1;
      }

      .sticker-card {
        position: absolute;
        inset: 0;
        display: block;
        border: 0;
        padding: 0;
        background: transparent;
        isolation: isolate;
        overflow: visible;
        --sticker-pointer-x: 50%;
        --sticker-pointer-y: 50%;
        --sticker-glare-x: 50%;
        --sticker-glare-y: 50%;
        --sticker-distance: 0;
        transform-style: preserve-3d;
        transform:
          rotateX(var(--sticker-rotate-x, 0deg))
          rotateY(var(--sticker-rotate-y, 0deg))
          scale(var(--sticker-scale, 0.84));
        opacity: 0;
        cursor: pointer;
        will-change: transform;
        transition: transform 140ms ease;
      }

      .sticker-stage.is-active .sticker-card {
        animation: sticker-pop 620ms cubic-bezier(0.2, 1, 0.2, 1) forwards;
      }

      .sticker-image {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        user-select: none;
        -webkit-user-drag: none;
        transform: translateZ(0);
        transform-origin: center;
        backface-visibility: hidden;
        image-rendering: -webkit-optimize-contrast;
        filter: drop-shadow(0 24px 34px rgba(0, 0, 0, 0.18));
      }

      .sticker-glare {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0;
        transform: translateZ(0);
        transition: opacity 180ms ease;
        -webkit-mask-image: var(--sticker-image-url);
        mask-image: var(--sticker-image-url);
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        -webkit-mask-size: contain;
        mask-size: contain;
      }

      .sticker-stage.is-active .sticker-glare {
        opacity: 1;
      }

      .sticker-glare {
        background-image:
          radial-gradient(
            circle at var(--sticker-glare-x) var(--sticker-glare-y),
            rgba(255, 255, 255, 0.95) 0%,
            rgba(255, 255, 255, 0.52) 10%,
            rgba(255, 255, 255, 0.18) 18%,
            rgba(255, 255, 255, 0) 36%
          ),
          linear-gradient(
            142deg,
            rgba(255, 255, 255, 0) 12%,
            rgba(255, 255, 255, 0.34) 32%,
            rgba(255, 255, 255, 0) 52%
          );
        background-size: 100% 100%, 180% 180%;
        background-position: center, var(--sticker-glare-x) var(--sticker-glare-y);
        background-repeat: no-repeat;
        mix-blend-mode: screen;
        filter: brightness(1.08);
        opacity: calc(0.22 + ((1 - var(--sticker-distance)) * 0.3));
      }

      @keyframes sticker-pop {
        0% {
          opacity: 0;
          transform:
            rotateX(var(--sticker-rotate-x, 0deg))
            rotateY(var(--sticker-rotate-y, 0deg))
            scale(0.74);
        }

        56% {
          opacity: 1;
          transform:
            rotateX(var(--sticker-rotate-x, 0deg))
            rotateY(var(--sticker-rotate-y, 0deg))
            scale(1.04);
        }

        100% {
          opacity: 1;
          transform:
            rotateX(var(--sticker-rotate-x, 0deg))
            rotateY(var(--sticker-rotate-y, 0deg))
            scale(1);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .sticker-card,
        .sticker-stage.is-active .sticker-card {
          animation: none;
          transition-duration: 0ms;
        }
      }

      @media (max-width: 900px) {
        .site-nav {
          top: 18px;
          left: 18px;
          right: auto;
          flex-direction: column;
          flex-wrap: nowrap;
          gap: 10px;
          align-items: flex-start;
        }

        .nav-button {
          font-size: clamp(1rem, 4.8vw, 1.18rem);
          line-height: 1.1;
        }

        .contact-panel {
          right: 18px;
          max-width: min(520px, calc(100vw - 36px));
          gap: 12px;
        }

        .about-panel {
          inset: 94px 18px 24px 12px;
          column-gap: 32px;
          row-gap: 12px;
          padding-left: clamp(200px, 24vw, 360px);
        }

        .contact-dino-stage {
          height: 280px;
        }

        .contact-dino-canvas {
          height: 100%;
        }

        .projects-dial {
          top: 56%;
          width: min(98vh, 132vw);
        }

        .projects-node {
          max-width: min(36vw, 260px);
        }

        .sticker-burst {
          width: min(52vw, 360px);
        }
      }

      @media (max-width: 520px) {
        .site-nav {
          top: 14px;
          left: 14px;
          right: auto;
          gap: 8px;
        }

        .nav-button {
          font-size: 0.98rem;
        }

        .contact-panel {
          right: 14px;
          top: auto;
          bottom: 184px;
          max-width: min(320px, calc(100vw - 28px));
          transform: translate3d(-64px, 0, 0);
        }

        .contact-dino-stage {
          height: 220px;
        }

        .contact-panel.is-visible {
          transform: translate3d(0, 0, 0);
        }

        .about-panel {
          inset: 76px 14px 18px 10px;
          grid-template-columns: minmax(0, 1fr);
          row-gap: 10px;
          padding-left: 0;
        }

        .about-panel .about-item.is-center,
        .about-panel .about-item.is-right {
          grid-column: 1;
          justify-self: start;
          text-align: left;
        }

        .contact-line {
          font-size: 1rem;
        }

        .help-text {
          left: 14px;
          bottom: 14px;
          font-size: 0.75rem;
        }

        .contact-runner-score-canvas {
          width: 132px;
          height: 14px;
        }

        .contact-runner-overlay {
          bottom: 90px;
          gap: 10px;
        }

        .contact-runner-gameover-canvas {
          width: 168px;
          height: 10px;
        }

        .contact-runner-restart-canvas {
          width: 32px;
          height: 28px;
        }

        .contact-dino-canvas {
          height: 100%;
        }

        .projects-dial {
          top: 60%;
          width: 150vw;
        }

        .projects-node {
          max-width: min(42vw, 230px);
        }

        .projects-node-title {
          font-size: clamp(1rem, 4.8vw, 1.62rem);
        }

        .sticker-burst {
          width: min(66vw, 300px);
        }
      }

    </style>
