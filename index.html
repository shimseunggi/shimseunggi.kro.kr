<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halftone Background</title>
    <style>
      :root {
        color-scheme: light dark;
        --overlay: rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
        background-color: #111;
        background-position: center;
        background-size: cover;
        background-repeat: no-repeat;
      }

      .panel {
        width: min(560px, calc(100vw - 2rem));
        padding: 1.25rem;
        border-radius: 16px;
        background: color-mix(in srgb, var(--overlay), transparent 25%);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.15);
      }

      h1 {
        margin-top: 0;
        margin-bottom: 0.6rem;
        font-size: 1.2rem;
      }

      p {
        margin: 0 0 1rem;
        line-height: 1.5;
      }

      input[type="file"] {
        width: 100%;
        padding: 0.6rem;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.08);
      }

      .hint {
        margin-top: 0.75rem;
        opacity: 0.85;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Background 이미지 → Halftone 자동 변환</h1>
      <p>
        <strong>Background 파일</strong>에 사진을 넣으면 점 패턴(halftone)으로 자동 변환 후
        웹 페이지 배경으로 적용됩니다.
      </p>
      <input id="backgroundInput" type="file" accept="image/*" />
      <p class="hint">권장: 선명한 대비가 있는 사진 (JPG/PNG/WebP)</p>
    </main>

    <script>
      const input = document.getElementById("backgroundInput");
      const dotsPerCell = 7;
      const minDot = 0.5;
      const maxDotScale = 0.95;

      input.addEventListener("change", async (event) => {
        const [file] = event.target.files || [];
        if (!file) return;

        const image = await loadImage(file);
        const dataUrl = createHalftoneDataUrl(image);
        document.body.style.backgroundImage = `url(${dataUrl})`;
      });

      function loadImage(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();

          reader.onerror = () => reject(new Error("파일을 읽을 수 없습니다."));
          reader.onload = () => {
            const image = new Image();
            image.onerror = () => reject(new Error("이미지 로딩에 실패했습니다."));
            image.onload = () => resolve(image);
            image.src = reader.result;
          };

          reader.readAsDataURL(file);
        });
      }

      function createHalftoneDataUrl(image) {
        const maxDimension = 1800;
        const scale = Math.min(1, maxDimension / Math.max(image.width, image.height));
        const width = Math.max(1, Math.round(image.width * scale));
        const height = Math.max(1, Math.round(image.height * scale));

        const sourceCanvas = document.createElement("canvas");
        sourceCanvas.width = width;
        sourceCanvas.height = height;
        const sourceCtx = sourceCanvas.getContext("2d", { willReadFrequently: true });
        sourceCtx.drawImage(image, 0, 0, width, height);

        const imageData = sourceCtx.getImageData(0, 0, width, height).data;

        const output = document.createElement("canvas");
        output.width = width;
        output.height = height;
        const ctx = output.getContext("2d");

        ctx.fillStyle = "#f4f4f4";
        ctx.fillRect(0, 0, width, height);

        for (let y = 0; y < height; y += dotsPerCell) {
          for (let x = 0; x < width; x += dotsPerCell) {
            const brightness = sampleAverageBrightness(imageData, width, height, x, y, dotsPerCell);
            const darkness = 1 - brightness / 255;
            if (darkness <= 0.01) continue;

            const radius = Math.max(minDot, (dotsPerCell * maxDotScale * darkness) / 2);
            ctx.beginPath();
            ctx.fillStyle = "#111";
            ctx.arc(x + dotsPerCell / 2, y + dotsPerCell / 2, radius, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        return output.toDataURL("image/webp", 0.92);
      }

      function sampleAverageBrightness(data, width, height, startX, startY, size) {
        let total = 0;
        let count = 0;

        const endX = Math.min(startX + size, width);
        const endY = Math.min(startY + size, height);

        for (let y = startY; y < endY; y++) {
          for (let x = startX; x < endX; x++) {
            const idx = (y * width + x) * 4;
            const r = data[idx];
            const g = data[idx + 1];
            const b = data[idx + 2];
            total += 0.299 * r + 0.587 * g + 0.114 * b;
            count++;
          }
        }

        return count ? total / count : 255;
      }
    </script>
  </body>
</html>
