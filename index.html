<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halftone Background</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <svg id="screen" viewBox="0 0 1 1" preserveAspectRatio="xMidYMid slice" aria-hidden="true"></svg>
    <div class="home-lizard-stage" id="home-lizard-stage" aria-hidden="true">
      <canvas class="home-lizard-canvas" id="home-lizard-canvas"></canvas>
    </div>
    <nav class="site-nav" aria-label="Primary">
      <button class="nav-button" data-section="home" type="button">Home</button>
      <button class="nav-button" data-section="projects" type="button">Projects</button>
      <button class="nav-button" data-section="about" type="button">About</button>
      <button class="nav-button" data-section="contact" type="button">Contact</button>
    </nav>
    <section class="about-panel" id="about-panel" aria-hidden="true"></section>
    <div class="help-text" id="help-text"></div>
    <div class="contact-runner-overlay" id="contact-runner-overlay" aria-hidden="true">
      <canvas class="contact-runner-gameover-canvas" id="contact-runner-gameover-canvas"></canvas>
      <button class="contact-runner-restart" id="contact-runner-restart" type="button" aria-label="Restart game">
        <canvas class="contact-runner-restart-canvas" id="contact-runner-restart-canvas"></canvas>
      </button>
    </div>
    <section class="contact-panel" id="contact-panel" aria-hidden="true">
      <div class="contact-kicker">Contact</div>
      <a class="contact-line is-link" href="mailto:shimseunggi@naver.com">shimseunggi@naver.com</a>
      <a class="contact-line is-link" href="https://github.com/shimseunggi" target="_blank" rel="noreferrer">github.com/shimseunggi</a>
      <div class="contact-kicker">Location</div>
      <div class="contact-line">Based in Gwangyang, Korea</div>
      <div class="contact-runner-scoreboard" id="contact-runner-scoreboard" aria-hidden="true">
        <canvas class="contact-runner-score-canvas" id="contact-runner-score-canvas"></canvas>
      </div>
    </section>
    <section class="contact-dino-stage" id="contact-dino-stage" aria-hidden="true">
      <canvas class="contact-dino-canvas" id="contact-dino-canvas" aria-hidden="true"></canvas>
    </section>
    <section class="projects-orbit" id="projects-orbit" aria-hidden="true">
      <div
        class="projects-dial"
        id="projects-dial"
        tabindex="0"
        role="region"
        aria-label="Projects dial"
      ></div>
    </section>
    <div class="sticker-stage" id="sticker-stage" aria-hidden="true">
      <div class="sticker-burst">
        <button class="sticker-card" id="sticker-card" type="button" aria-label="Close sticker">
          <img class="sticker-image" id="sticker-image" alt="" />
          <span class="sticker-glare" aria-hidden="true"></span>
        </button>
      </div>
    </div>

    <script defer src="./scripts/shared.js?v=2"></script>
    <script defer src="./scripts/about.js"></script>
    <script defer src="./scripts/contact.js"></script>
    <script defer src="./scripts/home.js"></script>
    <script defer src="./scripts/projects.js?v=2"></script>
    <script defer src="./scripts/main.js"></script>
  </body>
</html>
