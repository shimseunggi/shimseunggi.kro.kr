<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halftone Background</title>
    <style>
      @import url("https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css");

      :root {
        color-scheme: dark;
        --nav-dark: rgba(0, 0, 0, 0.62);
        --nav-dark-active: #000000;
        --nav-dark-hover: rgba(0, 0, 0, 0.84);
        --nav-light: rgba(255, 255, 255, 0.72);
        --nav-light-active: #ffffff;
        --nav-light-hover: rgba(255, 255, 255, 0.92);
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #fff;
      }

      body {
        position: relative;
        font-family: "Pretendard", "Helvetica Neue", "Arial Nova", Arial, sans-serif;
      }

      svg {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      .site-nav {
        position: fixed;
        top: 44px;
        left: 48px;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 26px;
      }

      .nav-button {
        border: 0;
        padding: 0;
        background: transparent;
        color: var(--nav-dark);
        font: inherit;
        font-size: clamp(1.6rem, 2.1vw, 2.2rem);
        font-weight: 400;
        letter-spacing: -0.03em;
        cursor: pointer;
        transition: color 180ms ease, transform 180ms ease, opacity 180ms ease;
        text-shadow:
          0 1px 10px rgba(255, 255, 255, 0.18),
          0 1px 10px rgba(0, 0, 0, 0.18);
      }

      .nav-button-label {
        display: inline-flex;
        align-items: center;
      }

      .nav-button-char {
        display: inline-block;
        transform: translate3d(0, 0, 0) rotate(0deg);
        transform-origin: 50% 60%;
        transition:
          transform 240ms cubic-bezier(0.22, 1, 0.36, 1),
          opacity 220ms ease,
          filter 220ms ease;
      }

      .nav-button-char.is-space {
        width: 0.28em;
      }

      .nav-button.is-fractured .nav-button-char {
        transform:
          translate3d(var(--fracture-x, 0px), var(--fracture-y, 0px), 0)
          rotate(var(--fracture-rotate, 0deg));
        opacity: var(--fracture-opacity, 1);
        filter: blur(var(--fracture-blur, 0px));
      }

      .nav-button:hover,
      .nav-button:focus-visible {
        transform: translateX(4px);
        outline: none;
      }

      .nav-button[data-contrast="dark"] {
        color: var(--nav-dark);
      }

      .nav-button[data-contrast="dark"]:hover,
      .nav-button[data-contrast="dark"]:focus-visible {
        color: var(--nav-dark-hover);
      }

      .nav-button[data-contrast="dark"][aria-current="page"] {
        color: var(--nav-dark-active);
      }

      .nav-button[data-contrast="light"] {
        color: var(--nav-light);
      }

      .nav-button[data-contrast="light"]:hover,
      .nav-button[data-contrast="light"]:focus-visible {
        color: var(--nav-light-hover);
      }

      .nav-button[data-contrast="light"][aria-current="page"] {
        color: var(--nav-light-active);
      }

      .projects-orbit {
        position: fixed;
        inset: 0;
        z-index: 1;
        opacity: 0;
        pointer-events: none;
        transition: opacity 260ms ease;
      }

      .projects-orbit.is-visible {
        opacity: 1;
        pointer-events: auto;
      }

      .contact-panel {
        position: fixed;
        right: 48px;
        top: 53%;
        z-index: 3;
        display: grid;
        justify-items: end;
        text-align: right;
        gap: 18px;
        max-width: min(620px, calc(100vw - 96px));
        opacity: 0;
        pointer-events: none;
        transform: translate3d(-96px, -50%, 0);
        transition:
          opacity 260ms ease,
          transform 320ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .contact-dino-stage {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 2;
        height: 290px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 220ms ease;
      }

      .contact-dino-stage.is-visible {
        opacity: 1;
      }

      .contact-dino-canvas {
        display: block;
        width: 100vw;
        height: 100%;
        border: 0;
        pointer-events: none;
      }

      .contact-panel.is-visible {
        opacity: 1;
        pointer-events: auto;
        transform: translate3d(0, -50%, 0);
      }

      .contact-line {
        color: rgba(17, 17, 17, 0.9);
        text-decoration: none;
        font-size: clamp(1.38rem, 2.6vw, 2.7rem);
        line-height: 1.08;
        letter-spacing: -0.03em;
        text-shadow:
          0 1px 10px rgba(255, 255, 255, 0.22),
          0 1px 8px rgba(255, 255, 255, 0.12);
      }

      .contact-line.is-link:hover,
      .contact-line.is-link:focus-visible {
        outline: none;
        text-decoration: underline;
        text-underline-offset: 0.16em;
      }

      .contact-kicker {
        color: rgba(17, 17, 17, 0.9);
        font-size: clamp(1.38rem, 2.6vw, 2.7rem);
        font-weight: 700;
        line-height: 1.08;
        letter-spacing: -0.03em;
        text-transform: uppercase;
        text-shadow:
          0 1px 10px rgba(255, 255, 255, 0.22),
          0 1px 8px rgba(255, 255, 255, 0.12);
      }

      .contact-text-label {
        display: inline-flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 0;
      }

      .contact-text-char {
        display: inline-block;
        transform: translate3d(0, 0, 0) rotate(0deg) scale(1);
        transform-origin: 50% 60%;
        transition:
          transform 280ms cubic-bezier(0.22, 1, 0.36, 1),
          opacity 240ms ease,
          filter 240ms ease;
      }

      .contact-text-char.is-space {
        width: 0.28em;
      }

      .contact-panel.is-blasted .contact-text-char {
        transform:
          translate3d(var(--contact-blast-x, 0px), var(--contact-blast-y, 0px), 0)
          rotate(var(--contact-blast-rotate, 0deg))
          scale(var(--contact-blast-scale, 1));
        opacity: var(--contact-blast-opacity, 1);
        filter: blur(var(--contact-blast-blur, 0px));
      }

      .projects-orbit:not(.is-visible) .projects-node,
      .projects-orbit:not(.is-visible) .projects-dial {
        pointer-events: none;
      }

      .projects-dial {
        position: absolute;
        top: 50%;
        right: 0;
        width: min(112vh, 118vw);
        aspect-ratio: 1;
        transform: translate(50%, -50%);
        border-radius: 50%;
        touch-action: none;
        cursor: grab;
        outline: none;
      }

      .projects-orbit.is-dragging .projects-dial {
        cursor: grabbing;
      }

      .projects-node {
        position: absolute;
        width: max-content;
        max-width: min(28vw, 360px);
        padding: 0.18em 0.3em;
        border: 0;
        background: transparent;
        color: #111111;
        text-align: right;
        transform-origin: 100% 50%;
        cursor: pointer;
        touch-action: manipulation;
        transition:
          left 360ms cubic-bezier(0.22, 1, 0.36, 1),
          top 360ms cubic-bezier(0.22, 1, 0.36, 1),
          transform 360ms cubic-bezier(0.22, 1, 0.36, 1),
          opacity 220ms ease;
      }

      .projects-orbit.is-dragging .projects-node {
        transition: none;
      }

      .projects-orbit.is-wheel-scrolling .projects-node {
        transition: none;
      }

      .projects-orbit.is-auto-rotating .projects-node {
        transition: none;
      }

      .projects-node:hover,
      .projects-node:focus-visible {
        outline: none;
      }

      .projects-node.is-active {
        opacity: 1;
      }

      .projects-node[data-contrast="dark"] {
        color: rgba(17, 17, 17, 0.9);
        text-shadow:
          0 1px 10px rgba(255, 255, 255, 0.24),
          0 1px 8px rgba(255, 255, 255, 0.12);
      }

      .projects-node[data-contrast="light"] {
        color: rgba(255, 255, 255, 0.94);
        text-shadow:
          0 1px 10px rgba(0, 0, 0, 0.24),
          0 1px 8px rgba(0, 0, 0, 0.12);
      }

      .projects-node-title {
        display: block;
        font-size: clamp(1.32rem, 2.15vw, 2.72rem);
        font-weight: 600;
        letter-spacing: -0.06em;
        line-height: 0.92;
        white-space: nowrap;
        pointer-events: none;
        user-select: none;
      }

      .home-lizard-stage {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        opacity: 0;
        mix-blend-mode: difference;
        transition: opacity 220ms ease;
      }

      .home-lizard-stage.is-visible {
        opacity: 1;
      }

      .home-lizard-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .sticker-stage {
        position: fixed;
        inset: 0;
        z-index: 4;
        display: grid;
        place-items: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 180ms ease;
      }

      .sticker-stage.is-active {
        opacity: 1;
        pointer-events: auto;
      }

      .sticker-burst {
        position: relative;
        perspective: 1400px;
        width: min(40vw, 440px);
        aspect-ratio: 1;
      }

      .sticker-card {
        position: absolute;
        inset: 0;
        display: block;
        border: 0;
        padding: 0;
        background: transparent;
        isolation: isolate;
        overflow: visible;
        --sticker-pointer-x: 50%;
        --sticker-pointer-y: 50%;
        --sticker-glare-x: 50%;
        --sticker-glare-y: 50%;
        --sticker-distance: 0;
        transform-style: preserve-3d;
        transform:
          rotateX(var(--sticker-rotate-x, 0deg))
          rotateY(var(--sticker-rotate-y, 0deg))
          scale(var(--sticker-scale, 0.84));
        opacity: 0;
        cursor: pointer;
        will-change: transform;
        transition: transform 140ms ease;
      }

      .sticker-stage.is-active .sticker-card {
        animation: sticker-pop 620ms cubic-bezier(0.2, 1, 0.2, 1) forwards;
      }

      .sticker-image {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        user-select: none;
        -webkit-user-drag: none;
        transform: translateZ(0);
        transform-origin: center;
        backface-visibility: hidden;
        image-rendering: -webkit-optimize-contrast;
        filter: drop-shadow(0 24px 34px rgba(0, 0, 0, 0.18));
      }

      .sticker-glare {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0;
        transform: translateZ(0);
        transition: opacity 180ms ease;
        -webkit-mask-image: var(--sticker-image-url);
        mask-image: var(--sticker-image-url);
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        -webkit-mask-size: contain;
        mask-size: contain;
      }

      .sticker-stage.is-active .sticker-glare {
        opacity: 1;
      }

      .sticker-glare {
        background-image:
          radial-gradient(
            circle at var(--sticker-glare-x) var(--sticker-glare-y),
            rgba(255, 255, 255, 0.95) 0%,
            rgba(255, 255, 255, 0.52) 10%,
            rgba(255, 255, 255, 0.18) 18%,
            rgba(255, 255, 255, 0) 36%
          ),
          linear-gradient(
            142deg,
            rgba(255, 255, 255, 0) 12%,
            rgba(255, 255, 255, 0.34) 32%,
            rgba(255, 255, 255, 0) 52%
          );
        background-size: 100% 100%, 180% 180%;
        background-position: center, var(--sticker-glare-x) var(--sticker-glare-y);
        background-repeat: no-repeat;
        mix-blend-mode: screen;
        filter: brightness(1.08);
        opacity: calc(0.22 + ((1 - var(--sticker-distance)) * 0.3));
      }

      @keyframes sticker-pop {
        0% {
          opacity: 0;
          transform:
            rotateX(var(--sticker-rotate-x, 0deg))
            rotateY(var(--sticker-rotate-y, 0deg))
            scale(0.74);
        }

        56% {
          opacity: 1;
          transform:
            rotateX(var(--sticker-rotate-x, 0deg))
            rotateY(var(--sticker-rotate-y, 0deg))
            scale(1.04);
        }

        100% {
          opacity: 1;
          transform:
            rotateX(var(--sticker-rotate-x, 0deg))
            rotateY(var(--sticker-rotate-y, 0deg))
            scale(1);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .sticker-card,
        .sticker-stage.is-active .sticker-card {
          animation: none;
          transition-duration: 0ms;
        }
      }

      @media (max-width: 900px) {
        .site-nav {
          top: 18px;
          left: 18px;
          right: auto;
          flex-direction: column;
          flex-wrap: nowrap;
          gap: 10px;
          align-items: flex-start;
        }

        .nav-button {
          font-size: clamp(1rem, 4.8vw, 1.18rem);
          line-height: 1.1;
        }

        .contact-panel {
          right: 18px;
          max-width: min(520px, calc(100vw - 36px));
          gap: 12px;
        }

        .contact-dino-stage {
          height: 240px;
        }

        .contact-dino-canvas {
          height: 100%;
        }

        .projects-dial {
          top: 56%;
          width: min(98vh, 132vw);
        }

        .projects-node {
          max-width: min(36vw, 260px);
        }

        .sticker-burst {
          width: min(52vw, 360px);
        }
      }

      @media (max-width: 520px) {
        .site-nav {
          top: 14px;
          left: 14px;
          right: auto;
          gap: 8px;
        }

        .nav-button {
          font-size: 0.98rem;
        }

        .contact-panel {
          right: 14px;
          top: auto;
          bottom: 184px;
          max-width: min(320px, calc(100vw - 28px));
          transform: translate3d(-64px, 0, 0);
        }

        .contact-dino-stage {
          height: 170px;
        }

        .contact-panel.is-visible {
          transform: translate3d(0, 0, 0);
        }

        .contact-line {
          font-size: 1rem;
        }

        .contact-dino-canvas {
          height: 100%;
        }

        .projects-dial {
          top: 60%;
          width: 150vw;
        }

        .projects-node {
          max-width: min(42vw, 230px);
        }

        .projects-node-title {
          font-size: clamp(1rem, 4.8vw, 1.62rem);
        }

        .sticker-burst {
          width: min(66vw, 300px);
        }
      }
    </style>

      window.addEventListener("pointercancel", handleLizardPointerUp, { passive: true });
      window.addEventListener("keydown", handleLizardKeyDown);
      window.addEventListener("keyup", handleLizardKeyUp);
      window.addEventListener("pointermove", handleContactDinoPointerMove, { passive: true });
      window.addEventListener("pointerdown", handleContactDinoPointerDown, { passive: true });
      window.addEventListener("pointerup", handleContactDinoPointerUp, { passive: true });

      navButtons.forEach((button) => {
        button.addEventListener("click", () => {
          setActiveSection(button.dataset.section, true);
        });
      });

      stickerStage.addEventListener("click", () => {
        hideSticker();
      });
      stickerCard.addEventListener("click", () => {
        hideSticker();
      });
      stickerStage.addEventListener("pointermove", handleStickerPointerMove);
      stickerStage.addEventListener("pointerleave", resetStickerTilt);
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && state.stickerVisible) {
          hideSticker();
        }
      });

      initializeProjectDial();
      state.projectOrbitRafId = window.requestAnimationFrame(runProjectOrbitLoop);
      initialize().catch((error) => {
        console.error(error);
        paintBlankFrame();
      });

      async function initialize() {
        syncNavigationFromHash();

        const candidates = await discoverBackgroundCandidates();
        const loaded = await loadFirstAvailableMedia(candidates);

        if (!loaded) {
          paintBlankFrame();
          return;
        }

        state.source = loaded.element;
        state.sourceType = loaded.type;
        state.sourceUrl = loaded.url;

        if (loaded.type === "video") {
          try {
            await loaded.element.play();
          } catch (error) {
            console.warn("Video autoplay was blocked.", error);
          }

          await renderCurrentSource();
          state.lastRenderAt = performance.now();
          runVideoLoop();
          return;
        }

        await renderCurrentSource();
      }

      async function discoverBackgroundCandidates() {
        const discovered = new Set(CONVENTIONAL_MEDIA);

        try {
          const response = await fetch("background/");
          if (response.ok) {
            const html = await response.text();
            extractMediaLinksFromDirectoryListing(html).forEach((url) => discovered.add(url));
          }
        } catch (error) {
          console.warn("Failed to inspect background directory.", error);
        }

        return [...discovered];
      }

      function extractMediaLinksFromDirectoryListing(html) {
        const parser = new DOMParser();
        const documentFragment = parser.parseFromString(html, "text/html");
        const links = [...documentFragment.querySelectorAll("a[href]")];

        return links
          .map((link) => link.getAttribute("href") || "")
          .filter((href) => isSupportedMediaPath(href))
          .map((href) => normalizeBackgroundUrl(href));
      }

      function normalizeBackgroundUrl(href) {
        const cleaned = href.replace(/^\.?\//, "");
        return cleaned.startsWith("background/") ? cleaned : `background/${cleaned}`;
      }

      function isSupportedMediaPath(path) {
        const normalized = path.toLowerCase();
        if (!normalized || normalized.endsWith("/")) return false;
        return [...IMAGE_EXTENSIONS, ...VIDEO_EXTENSIONS].some((extension) =>
          normalized.endsWith(extension),
        );
      }

      async function loadFirstAvailableMedia(candidates) {
        for (const candidate of candidates) {
          try {
            if (isVideoPath(candidate)) {
              const video = await loadVideo(candidate);
              return { element: video, type: "video", url: candidate };
            }

            if (isImagePath(candidate)) {
              const image = await loadImage(candidate);
              return { element: image, type: "image", url: candidate };
            }
          } catch (error) {
            console.warn(`Skipping unavailable media: ${candidate}`, error);
          }
        }

        return null;
      }

      function isImagePath(path) {
        const normalized = path.toLowerCase();
        return IMAGE_EXTENSIONS.some((extension) => normalized.endsWith(extension));
      }

      function isVideoPath(path) {
        const normalized = path.toLowerCase();
        return VIDEO_EXTENSIONS.some((extension) => normalized.endsWith(extension));
      }

      function loadImage(url) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.decoding = "async";
          image.onload = () => resolve(image);
          image.onerror = () => reject(new Error(`Failed to load image: ${url}`));
          image.src = url;
        });
      }

      function loadVideo(url) {
        return new Promise((resolve, reject) => {
          const video = document.createElement("video");
          video.muted = true;
          video.loop = true;
          video.playsInline = true;
          video.preload = "auto";

          video.onloadeddata = () => resolve(video);
          video.onerror = () => reject(new Error(`Failed to load video: ${url}`));
          video.src = url;
        });
      }

      function runVideoLoop() {
        const tick = async (timestamp) => {
          if (state.sourceType !== "video" || !state.source) return;

          const source = state.source;
          const shouldRender =
            timestamp - state.lastRenderAt >= 1000 / renderConfig.videoFps &&
            source.readyState >= 2 &&
            !source.paused;

          if (shouldRender) {
            await renderCurrentSource();
            state.lastRenderAt = timestamp;
          }

          state.rafId = window.requestAnimationFrame(tick);
        };

        state.rafId = window.requestAnimationFrame(tick);
      }

      function renderCurrentSource() {
        if (!state.source) return;
        const frame = createHalftoneFrameData(state.source);
        state.lastFrame = frame;
        renderFrameToSvg(frame);
        updateNavButtonContrast(frame);
        updateProjectNodeContrast(frame);
      }

      function createHalftoneFrameData(source) {
        const dimensions = getSourceDimensions(source);
        const scale = Math.min(
          1,
          renderConfig.maxDimension / Math.max(dimensions.width, dimensions.height),
        );
        const width = Math.max(1, Math.round(dimensions.width * scale));
        const height = Math.max(1, Math.round(dimensions.height * scale));

        workerCanvas.width = width;
        workerCanvas.height = height;
        workerContext.clearRect(0, 0, width, height);
        workerContext.drawImage(source, 0, 0, width, height);

        const imageData = workerContext.getImageData(0, 0, width, height).data;
        const cols = Math.ceil(width / renderConfig.dotsPerCell);
        const rows = Math.ceil(height / renderConfig.dotsPerCell);
        const brightnessGrid = new Array(cols * rows);
        const dots = [];

        for (let row = 0, y = 0; y < height; row += 1, y += renderConfig.dotsPerCell) {
          for (let col = 0, x = 0; x < width; col += 1, x += renderConfig.dotsPerCell) {
            const tone = sampleCellTone(
              imageData,
              width,
              height,
              x,
              y,
              renderConfig.dotsPerCell,
            );
            brightnessGrid[row * cols + col] = tone.brightness;
            const darkness = 1 - tone.brightness / 255;
            if (darkness <= 0.02) continue;

            const radius = Math.max(
              renderConfig.minDot,
              (renderConfig.dotsPerCell * renderConfig.maxDotScale * darkness) / 2,
            );
            dots.push({
              cx: formatNumber(x + renderConfig.dotsPerCell / 2),
              cy: formatNumber(y + renderConfig.dotsPerCell / 2),
              r: formatNumber(radius),
              fill: rgbToCss(tone),
            });
          }
        }

        return {
          width,
          height,
          cols,
          rows,
          cellSize: renderConfig.dotsPerCell,
          brightnessGrid,
          dots,
        };
      }

      function paintBlankFrame() {
        state.dotNodes = [];
        state.frameWidth = 1;
        state.frameHeight = 1;
        state.lastFrame = null;
        screenSvg.setAttribute("viewBox", "0 0 1 1");
        screenSvg.replaceChildren(createSvgRect(1, 1));
        updateNavButtonContrast(null);
        updateProjectNodeContrast(null);
      }

      function syncNavigationFromHash() {
        const hash = window.location.hash.replace("#", "").toLowerCase();
        const fallback = navButtons[0]?.dataset.section || "home";
        const nextSection = navButtons.some((button) => button.dataset.section === hash)
          ? hash
          : fallback;

        setActiveSection(nextSection, false);
      }

      function setActiveSection(section, updateHash) {
        const previousSection = state.activeSection;
        state.activeSection = section;
        pageBody.dataset.section = section;

        navButtons.forEach((button) => {
          const isActive = button.dataset.section === section;
          if (isActive) {
            button.setAttribute("aria-current", "page");
            return;
          }

          button.removeAttribute("aria-current");
        });

        if (updateHash) {
          window.location.hash = section;
        }

        updateSectionPanels(previousSection);
      }

      function updateSectionPanels(previousSection = "") {
        const showProjects = state.activeSection === "projects";
        const showContact = state.activeSection === "contact";
        positionContactPanel();
        projectsOrbit.classList.toggle("is-visible", showProjects);
        projectsOrbit.setAttribute("aria-hidden", String(!showProjects));
        projectsDial.setAttribute("aria-hidden", String(!showProjects));
        state.projectNodes.forEach((node) => {
          node.disabled = !showProjects;
          node.tabIndex = showProjects ? 0 : -1;
        });
        contactPanel.classList.toggle("is-visible", showContact);
        contactPanel.setAttribute("aria-hidden", String(!showContact));
        lizardState.visible = state.activeSection === "home";
        if (showProjects && previousSection !== "projects") {
          state.projectOrbitIntroStartAt = 0;
          state.projectOrbitIntroFromRotation = state.dialRotation;
          state.projectOrbitIntroToRotation = state.dialRotation + 7.5;
        } else if (!showProjects) {
          state.projectOrbitIntroStartAt = 0;
          state.projectOrbitIntroFromRotation = state.dialRotation;
          state.projectOrbitIntroToRotation = state.dialRotation;
          projectsOrbit.classList.remove("is-auto-rotating");
        }
        updateHomeLizardState(previousSection);
        updateContactDinoState(previousSection);

        if (!showProjects) return;

        updateProjectDial(true);
      }

      function positionContactPanel() {
        if (!contactNavButton || !contactPanel) return;
        contactPanel.style.left = "";
        contactPanel.style.top = "";
      }

      function clampValue(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerpValue(a, b, t) {
        return a + (b - a) * t;
      }

      function solveTwoBoneIK(root, target, len1, len2, bendDir = 1) {
        const dx = target.x - root.x;
        const dy = target.y - root.y;
        const distance = Math.max(0.0001, Math.min(Math.hypot(dx, dy), len1 + len2 - 0.001));
        const base = Math.atan2(dy, dx);
        let cosine = (len1 * len1 + distance * distance - len2 * len2) / (2 * len1 * distance);
        cosine = clampValue(cosine, -1, 1);
        const angle = Math.acos(cosine) * bendDir;
        return {
          x: root.x + Math.cos(base + angle) * len1,
          y: root.y + Math.sin(base + angle) * len1,
        };
      }

      class ContactFootStepper {
        constructor(x, y, stride, lift) {
          this.x = x;
          this.y = y;
          this.fromX = x;
          this.fromY = y;
          this.toX = x;
          this.toY = y;
          this.stride = stride;
          this.lift = lift;
          this.progress = 1;
        }

        update(anchorX, groundY, moveX, face, dt) {
          const desiredX = anchorX + face * this.stride;
          const tooFar = Math.abs(this.x - desiredX) > this.stride * 0.9;
          if (this.progress >= 1 && tooFar) {
            this.fromX = this.x;
            this.fromY = this.y;
            this.toX = anchorX + face * this.stride + moveX * 4.5;
            this.toY = groundY;
            this.progress = 0;
          }

          if (this.progress < 1) {
            this.progress = Math.min(1, this.progress + dt * 4.5);
            const arc = Math.sin(this.progress * Math.PI) * this.lift;
            this.x = lerpValue(this.fromX, this.toX, this.progress);
            this.y = lerpValue(this.fromY, this.toY, this.progress) - arc;
            return;
          }

          this.x = lerpValue(this.x, desiredX, 0.08);
          this.y = lerpValue(this.y, groundY, 0.22);
        }
      }

      function getContactDinoScale(width = contactDinoState.width || 420) {
        return Math.min(1.75, Math.max(1.28, width / 430));
      }

      function getContactDinoAnchorPoint() {
        return {
          x: Math.max(170, contactDinoState.width * 0.42),
          y: contactDinoState.height * 0.7,
        };
      }

      function getContactDinoParkedPoint() {
        return {
          x: -170 * getContactDinoScale(),
          y: contactDinoState.height * 0.72,
        };
      }

      function updateContactDinoAnchors() {
        const anchorPoint = getContactDinoAnchorPoint();
        const parkedPoint = getContactDinoParkedPoint();
        contactDinoState.anchor.x = anchorPoint.x;
        contactDinoState.anchor.y = anchorPoint.y;
        contactDinoState.parked.x = parkedPoint.x;
        contactDinoState.parked.y = parkedPoint.y;
      }

      function placeContactDino(x, face = 1) {
        if (!contactDinoState.dino) {
          contactDinoState.dino = createContactDino();
        }

        const dino = contactDinoState.dino;
        dino.scale = getContactDinoScale();
        dino.x = x;
        dino.y = dino.groundAt(x) - 46 * dino.scale;
        dino.vx = 0;
        dino.vy = 0;
        dino.face = face;
        dino.drawFace = face;
        dino.roar = 0;
        dino.blink = 0;
        dino.walk = 0;

        dino.footBackNear = new ContactFootStepper(
          dino.x - face * 24 * dino.scale,
          dino.groundAt(dino.x - face * 24 * dino.scale),
          28 * dino.scale,
          16 * dino.scale,
        );
        dino.footBackFar = new ContactFootStepper(
          dino.x + face * 12 * dino.scale,
          dino.groundAt(dino.x + face * 12 * dino.scale),
          28 * dino.scale,
          16 * dino.scale,
        );
      }

      function updateContactDinoState(previousSection = "") {
        const showContact = state.activeSection === "contact";
        contactDinoState.visible = showContact;
        updateContactDinoAnchors();

        if (!contactDinoState.dino) {
          contactDinoState.dino = createContactDino();
          placeContactDino(contactDinoState.parked.x, -1);
        }

        if (showContact) {
          contactDinoState.renderVisible = true;
          contactDinoStage.classList.add("is-visible");
          contactDinoStage.setAttribute("aria-hidden", "false");

          if (previousSection !== "contact" || contactDinoState.mode === "parked") {
            placeContactDino(contactDinoState.parked.x, 1);
            contactDinoState.mode = "entering";
            contactDinoState.pointer.inside = false;
            contactDinoState.pointer.down = false;
            contactDinoState.waveRadius = 0;
          }
          return;
        }

        if (
          previousSection === "contact" ||
          contactDinoState.mode === "active" ||
          contactDinoState.mode === "entering"
        ) {
          contactDinoState.renderVisible = true;
          contactDinoState.mode = "exiting";
          contactDinoState.pointer.inside = false;
          contactDinoState.pointer.down = false;
          contactDinoState.waveRadius = 0;
          contactDinoStage.classList.add("is-visible");
          contactDinoStage.setAttribute("aria-hidden", "false");
          return;
        }

        if (contactDinoState.mode === "parked") {
          contactDinoState.renderVisible = false;
          contactDinoStage.classList.remove("is-visible");
          contactDinoStage.setAttribute("aria-hidden", "true");
        }
      }

      function createContactDino() {
        const width = Math.max(280, contactDinoState.width || 420);
        const height = Math.max(140, contactDinoState.height || 220);
        const dino = {
          x: width * 0.42,
          y: height * 0.7,
          vx: 0,
          vy: 0,
          face: 1,
          drawFace: 1,
          walk: 0,
          time: 0,
          roar: 0,
          blink: 0,
          blinkTimer: 1.4,
          footBackNear: null,
          footBackFar: null,
          scale: getContactDinoScale(width),
        };

        const groundAt = (x) =>
          height * 0.84 + Math.sin(x * 0.024) * 5 + Math.sin(x * 0.009 + 1.2) * 4;

        dino.groundAt = groundAt;
        dino.footBackNear = new ContactFootStepper(
          dino.x - 24 * dino.scale,
          groundAt(dino.x - 24 * dino.scale),
          28 * dino.scale,
          16 * dino.scale,
        );
        dino.footBackFar = new ContactFootStepper(
          dino.x + 12 * dino.scale,
          groundAt(dino.x + 12 * dino.scale),
          28 * dino.scale,
          16 * dino.scale,
        );
        return dino;
      }

      function resizeContactDinoCanvas() {
        if (!contactDinoCanvas || !contactDinoContext) return;

        const rect = contactDinoCanvas.getBoundingClientRect();
        const width = Math.max(220, Math.round(rect.width || 420));
        const height = Math.max(120, Math.round(rect.height || 220));
        const dpr = Math.min(window.devicePixelRatio || 1, 2);

        contactDinoState.width = width;
        contactDinoState.height = height;
        contactDinoState.dpr = dpr;
        contactDinoCanvas.width = Math.round(width * dpr);
        contactDinoCanvas.height = Math.round(height * dpr);
        contactDinoContext.setTransform(dpr, 0, 0, dpr, 0, 0);
        updateContactDinoAnchors();

        if (!contactDinoState.dino) {
          contactDinoState.dino = createContactDino();
          placeContactDino(contactDinoState.parked.x, -1);
        } else {
          contactDinoState.dino.scale = getContactDinoScale(width);
          contactDinoState.dino.groundAt = (x) =>
            height * 0.84 + Math.sin(x * 0.024) * 5 + Math.sin(x * 0.009 + 1.2) * 4;

          if (contactDinoState.mode === "parked" && !contactDinoState.renderVisible) {
            placeContactDino(contactDinoState.parked.x, -1);
          }
        }

        if (!contactDinoState.pointer.inside) {
          contactDinoState.pointer.x = width * 0.68;
          contactDinoState.pointer.y = height * 0.58;
        }
      }

      function handleContactDinoPointerMove(event) {
        if (
          !contactDinoCanvas ||
          state.activeSection !== "contact" ||
          !contactDinoState.renderVisible ||
          contactDinoState.mode !== "active"
        ) {
          contactDinoState.pointer.inside = false;
          return;
        }

        const rect = contactDinoCanvas.getBoundingClientRect();
        const inside =
          event.clientX >= rect.left &&
          event.clientX <= rect.right &&
          event.clientY >= rect.top &&
          event.clientY <= rect.bottom;
        contactDinoState.pointer.inside = inside;
        if (!inside) return;
        contactDinoState.pointer.x = event.clientX - rect.left;
        contactDinoState.pointer.y = event.clientY - rect.top;
      }

      function handleContactDinoPointerDown(event) {
        if (
          !contactDinoCanvas ||
          state.activeSection !== "contact" ||
          contactDinoState.mode !== "active" ||
          !contactDinoState.dino
        ) return;

        const rect = contactDinoCanvas.getBoundingClientRect();
        const inside =
          event.clientX >= rect.left &&
          event.clientX <= rect.right &&
          event.clientY >= rect.top &&
          event.clientY <= rect.bottom;

        contactDinoState.pointer.inside = inside;
        if (!inside) return;

        contactDinoState.pointer.x = event.clientX - rect.left;
        contactDinoState.pointer.y = event.clientY - rect.top;
        contactDinoState.pointer.down = true;
        contactDinoState.dino.roar = 1;
      }

      function handleContactDinoPointerUp() {
        contactDinoState.pointer.down = false;
      }

      function getContactDinoSnoutOffset(face, scale) {
        return {
          x: face * 127 * scale,
          y: -37 * scale,
        };
      }

      function updateContactDino(dt) {
        const dino = contactDinoState.dino;
        if (!dino) return;

        dino.time += dt;
        dino.roar = Math.max(0, dino.roar - dt * 1.6);
        dino.blinkTimer -= dt;
        if (dino.blinkTimer <= 0) {
          dino.blink = 1;
          dino.blinkTimer = 1.6 + Math.random() * 2.2;
        }
        dino.blink = Math.max(0, dino.blink - dt * 7);
        updateContactDinoAnchors();

        let desiredFace = dino.face;
        let targetX = dino.x;
        let clampMinX = -220 * dino.scale;
        let clampMaxX = contactDinoState.width + 220 * dino.scale;

        if (contactDinoState.mode === "entering") {
          desiredFace = 1;
          targetX = contactDinoState.anchor.x;
        } else if (contactDinoState.mode === "exiting" || contactDinoState.mode === "parked") {
          desiredFace = -1;
          targetX = contactDinoState.parked.x;
        } else {
          const pointerInside = contactDinoState.pointer.inside;
          const targetSnoutX = pointerInside
            ? contactDinoState.pointer.x
            : contactDinoState.anchor.x + 88 * dino.scale + Math.sin(dino.time * 0.9) * 26;
          desiredFace = Math.abs(targetSnoutX - dino.x) > 6
            ? targetSnoutX >= dino.x
              ? 1
              : -1
            : dino.face;
          const snoutOffset = getContactDinoSnoutOffset(desiredFace, dino.scale);
          targetX = targetSnoutX - snoutOffset.x;
          const horizontalMargin = 134 * dino.scale;
          clampMinX = horizontalMargin;
          clampMaxX = contactDinoState.width - horizontalMargin;
        }

        const dx = targetX - dino.x;
        const accelX = clampValue(dx * 0.012, -0.92, 0.92);
        dino.vx += accelX;
        dino.vx *= 0.9;
        dino.x = clampValue(dino.x + dino.vx * 60 * dt, clampMinX, clampMaxX);

        dino.face = desiredFace;
        dino.drawFace = lerpValue(dino.drawFace, dino.face, 0.16);

        const bodyGround = dino.groundAt(dino.x);
        const targetY = bodyGround - 46 * dino.scale + Math.sin(dino.time * 4.8) * 1.2;
        dino.vy += (targetY - dino.y) * 0.06;
        dino.vy *= 0.8;
        dino.y += dino.vy * 60 * dt;

        const speed = Math.abs(dino.vx);
        dino.walk += dt * (2.2 + speed * 0.18);

        const hipNearX = dino.x - dino.face * 10 * dino.scale;
        const hipFarX = dino.x + dino.face * 22 * dino.scale;
        dino.footBackNear.update(hipNearX, dino.groundAt(hipNearX), dino.vx * 0.05, dino.face, dt);
        dino.footBackFar.update(hipFarX, dino.groundAt(hipFarX), dino.vx * 0.05, dino.face, dt);

        if (contactDinoState.mode === "entering" && Math.abs(dino.x - contactDinoState.anchor.x) < 16) {
          contactDinoState.mode = "active";
        }

        if (contactDinoState.mode === "exiting" && dino.x < contactDinoState.parked.x + 12) {
          contactDinoState.mode = "parked";
          contactDinoState.renderVisible = false;
          contactDinoState.pointer.inside = false;
          contactDinoState.pointer.down = false;
          contactDinoState.waveRadius = 0;
          contactDinoStage.classList.remove("is-visible");
          contactDinoStage.setAttribute("aria-hidden", "true");
        }
      }

      function drawContactPolyline(points) {
        if (!points.length) return;
        contactDinoContext.beginPath();
        contactDinoContext.moveTo(points[0].x, points[0].y);
        for (let index = 1; index < points.length; index += 1) {
          contactDinoContext.lineTo(points[index].x, points[index].y);
        }
        contactDinoContext.stroke();
      }

      function drawContactDinoLeg(root, foot, upperLen, lowerLen, far = false) {
        const dino = contactDinoState.dino;
        const bend = dino.drawFace > 0 ? 1 : -1;
        const knee = solveTwoBoneIK(root, foot, upperLen, lowerLen, bend);
        contactDinoContext.strokeStyle = far ? "rgba(17,17,17,0.38)" : "rgba(17,17,17,0.92)";
        contactDinoContext.lineWidth = far ? 1.8 : 2.3;
        contactDinoContext.lineCap = "round";
        contactDinoContext.lineJoin = "round";
        contactDinoContext.beginPath();
        contactDinoContext.moveTo(root.x, root.y);
        contactDinoContext.lineTo(knee.x, knee.y);
        contactDinoContext.lineTo(foot.x, foot.y);
        contactDinoContext.stroke();

        contactDinoContext.lineWidth = far ? 1 : 1.2;
        contactDinoContext.beginPath();
        contactDinoContext.moveTo(foot.x - dino.drawFace * 4, foot.y);
        contactDinoContext.lineTo(foot.x + dino.drawFace * 4, foot.y);
        contactDinoContext.moveTo(foot.x - dino.drawFace * 1, foot.y + 1);
        contactDinoContext.lineTo(foot.x + dino.drawFace * 5, foot.y + 3);
        contactDinoContext.stroke();
      }

      function drawContactDinoArm(shoulder, phase, far = false) {
        const dino = contactDinoState.dino;
        const angle1 = -0.5 + Math.sin(phase) * 0.22;
        const angle2 = 0.9 + Math.cos(phase * 1.05) * 0.25;
        const elbow = {
          x: shoulder.x + Math.cos(angle1) * 12 * dino.drawFace,
          y: shoulder.y + Math.sin(angle1) * 12,
        };
        const hand = {
          x: elbow.x + Math.cos(angle1 + angle2) * 10 * dino.drawFace,
          y: elbow.y + Math.sin(angle1 + angle2) * 10,
        };

        contactDinoContext.strokeStyle = far ? "rgba(17,17,17,0.32)" : "rgba(17,17,17,0.86)";
        contactDinoContext.lineWidth = far ? 1.4 : 1.8;
        contactDinoContext.beginPath();
        contactDinoContext.moveTo(shoulder.x, shoulder.y);
        contactDinoContext.lineTo(elbow.x, elbow.y);
        contactDinoContext.lineTo(hand.x, hand.y);
        contactDinoContext.stroke();
      }

      function drawContactDinoHead(headBase, jawOpen) {
        const dino = contactDinoState.dino;
        const scale = dino.scale;
        const skull = { x: headBase.x + dino.drawFace * 22 * scale, y: headBase.y - 4 * scale };
        const snout = { x: skull.x + dino.drawFace * 26 * scale, y: skull.y + 5 * scale };
        const brow = { x: headBase.x + dino.drawFace * 7 * scale, y: headBase.y - 12 * scale };
        const jawEnd = {
          x: skull.x + dino.drawFace * 22 * scale,
          y: skull.y + 10 * scale + jawOpen,
        };

        contactDinoContext.strokeStyle = "rgba(17,17,17,0.94)";
        contactDinoContext.lineWidth = 2.2;
        drawContactPolyline([headBase, brow, skull, snout]);

        contactDinoContext.lineWidth = 1.7;
        drawContactPolyline([
          { x: headBase.x + dino.drawFace * 3 * scale, y: headBase.y + 1 * scale },
          {
            x: headBase.x + dino.drawFace * 10 * scale,
            y: headBase.y + 5 * scale + jawOpen * 0.2,
          },
          jawEnd,
        ]);

        contactDinoContext.lineWidth = 0.9;
        for (let index = 0; index < 4; index += 1) {
          const toothX = skull.x + dino.drawFace * (5 + index * 5) * scale;
          const toothY = skull.y + 5 * scale + index * 0.3 * scale;
          contactDinoContext.beginPath();
          contactDinoContext.moveTo(toothX, toothY);
          contactDinoContext.lineTo(
            toothX + dino.drawFace * 3 * scale,
            toothY + 3 * scale + jawOpen * 0.1,
          );
          contactDinoContext.stroke();
        }

        const eye = { x: headBase.x + dino.drawFace * 14 * scale, y: headBase.y - 7 * scale };
        if (dino.blink > 0) {
          contactDinoContext.lineWidth = 1;
          contactDinoContext.beginPath();
          contactDinoContext.moveTo(eye.x - dino.drawFace * 3 * scale, eye.y);
          contactDinoContext.lineTo(eye.x + dino.drawFace * 3 * scale, eye.y);
          contactDinoContext.stroke();
        } else {
          contactDinoContext.beginPath();
          contactDinoContext.arc(eye.x, eye.y, 1.8 * scale, 0, Math.PI * 2);
          contactDinoContext.fillStyle = "rgba(17,17,17,0.94)";
          contactDinoContext.fill();
        }

        if (dino.roar > 0) {
          const pulse = 1 - dino.roar;
          const waveDirection = dino.drawFace >= 0 ? 0 : Math.PI;
          const waveSpreadOuter = 0.5;
          const waveSpreadInner = 0.45;
          contactDinoContext.strokeStyle = `rgba(17,17,17,${(0.28 * dino.roar).toFixed(3)})`;
          contactDinoContext.lineWidth = 1.2;
          contactDinoContext.beginPath();
          contactDinoContext.arc(
            snout.x + dino.drawFace * 5 * scale,
            snout.y,
            10 * scale + pulse * 32,
            waveDirection - waveSpreadOuter,
            waveDirection + waveSpreadOuter,
          );
          contactDinoContext.stroke();
          contactDinoContext.beginPath();
          contactDinoContext.arc(
            snout.x + dino.drawFace * 5 * scale,
            snout.y,
            24 * scale + pulse * 86,
            waveDirection - waveSpreadInner,
            waveDirection + waveSpreadInner,
          );
          contactDinoContext.stroke();
        }

        const canvasRect = contactDinoCanvas.getBoundingClientRect();
        contactDinoState.snoutViewport.x = canvasRect.left + snout.x + dino.drawFace * 5 * scale;
        contactDinoState.snoutViewport.y = canvasRect.top + snout.y;
        contactDinoState.waveRadius =
          dino.roar > 0 ? 42 * scale + (1 - dino.roar) * 360 : 0;
      }

      function renderContactDino() {
        if (!contactDinoContext || !contactDinoState.dino) return;

        const { width, height } = contactDinoState;
        contactDinoContext.clearRect(0, 0, width, height);
        if (!contactDinoState.renderVisible) {
          contactDinoState.waveRadius = 0;
          return;
        }

        const dino = contactDinoState.dino;
        const scale = dino.scale;

        contactDinoContext.strokeStyle = "rgba(17,17,17,0.14)";
        contactDinoContext.lineWidth = 1;
        contactDinoContext.beginPath();
        for (let x = 0; x <= width; x += 8) {
          const y = dino.groundAt(x);
          if (x === 0) contactDinoContext.moveTo(x, y);
          else contactDinoContext.lineTo(x, y);
        }
        contactDinoContext.stroke();

        const bob = Math.sin(dino.walk * 2.4) * Math.min(4.5 * scale, Math.abs(dino.vx) * 0.18);
        const hip = { x: dino.x, y: dino.y + bob };
        const chest = { x: hip.x + dino.drawFace * 40 * scale, y: hip.y - 15 * scale };
        const neck1 = { x: chest.x + dino.drawFace * 16 * scale, y: chest.y - 10 * scale };
        const neck2 = { x: neck1.x + dino.drawFace * 12 * scale, y: neck1.y - 12 * scale };
        const headBase = { x: neck2.x + dino.drawFace * 6 * scale, y: neck2.y - 1 * scale };
        const tail1 = { x: hip.x - dino.drawFace * 30 * scale, y: hip.y - 8 * scale };
        const tail2 = {
          x: tail1.x - dino.drawFace * 34 * scale,
          y: tail1.y - 4 * scale + Math.sin(dino.walk) * 7 * scale,
        };
        const tail3 = {
          x: tail2.x - dino.drawFace * 36 * scale,
          y: tail2.y + Math.sin(dino.walk + 0.8) * 9 * scale,
        };

        const hipFar = { x: hip.x + dino.drawFace * 8 * scale, y: hip.y + 3 * scale };
        const hipNear = { x: hip.x - dino.drawFace * 6 * scale, y: hip.y + 4 * scale };
        const shoulderFar = { x: chest.x - dino.drawFace * 7 * scale, y: chest.y + 5 * scale };
        const shoulderNear = { x: chest.x - dino.drawFace * 1 * scale, y: chest.y + 7 * scale };

        drawContactDinoLeg(
          hipFar,
          { x: dino.footBackFar.x, y: dino.footBackFar.y },
          26 * scale,
          24 * scale,
          true,
        );
        drawContactDinoArm(shoulderFar, dino.walk + Math.PI, true);

        contactDinoContext.strokeStyle = "rgba(17,17,17,0.94)";
        contactDinoContext.lineWidth = 2.5;
        contactDinoContext.lineCap = "round";
        contactDinoContext.lineJoin = "round";
        drawContactPolyline([tail3, tail2, tail1, hip, chest, neck1, neck2, headBase]);

        contactDinoContext.lineWidth = 1.2;
        drawContactPolyline([
          { x: hip.x + dino.drawFace * 7 * scale, y: hip.y + 11 * scale },
          { x: chest.x - dino.drawFace * 6 * scale, y: chest.y + 12 * scale },
          { x: neck1.x - dino.drawFace * 2 * scale, y: neck1.y + 8 * scale },
        ]);

        drawContactDinoLeg(
          hipNear,
          { x: dino.footBackNear.x, y: dino.footBackNear.y },
          28 * scale,
          26 * scale,
          false,
        );
        drawContactDinoArm(shoulderNear, dino.walk, false);

        const jawOpen = contactDinoState.pointer.down ? 12 * scale : dino.roar > 0 ? 8 * scale : 0;
        drawContactDinoHead(headBase, jawOpen);
      }

      function runContactDinoLoop(now) {
        const dt = contactDinoState.lastAt
          ? Math.min(0.033, (now - contactDinoState.lastAt) / 1000)
          : 0.016;
        contactDinoState.lastAt = now;
        updateContactDino(dt);
        renderContactDino();
        updateContactTextBlast();
        contactDinoState.rafId = window.requestAnimationFrame(runContactDinoLoop);
      }

      function prepareNavButtonLetters() {
        navButtons.forEach((button) => {
          if (button.dataset.fractureReady === "true") return;

          const text = (button.textContent || "").trim();
          button.dataset.fractureReady = "true";
          button.setAttribute("aria-label", text);

          const label = document.createElement("span");
          label.className = "nav-button-label";
          label.setAttribute("aria-hidden", "true");

          [...text].forEach((character, index) => {
            const char = document.createElement("span");
            char.className = `nav-button-char${character === " " ? " is-space" : ""}`;
            char.textContent = character === " " ? "\u00a0" : character;
            char.style.setProperty("--fracture-index", String(index));
            label.append(char);
          });

          button.textContent = "";
          button.append(label);
          navFractureState.set(button, { intensity: 0, impactX: 0, impactY: 0 });
        });
      }

      function prepareContactTextLetters() {
        const items = contactPanel.querySelectorAll(".contact-line, .contact-kicker");
        items.forEach((item) => {
          if (item.dataset.blastReady === "true") return;

          const text = (item.textContent || "").trim();
          item.dataset.blastReady = "true";
          const label = document.createElement("span");
          label.className = "contact-text-label";
          label.setAttribute("aria-hidden", "true");

          [...text].forEach((character) => {
            const char = document.createElement("span");
            char.className = `contact-text-char${character === " " ? " is-space" : ""}`;
            char.textContent = character === " " ? "\u00a0" : character;
            label.append(char);
          });

          item.setAttribute("aria-label", text);
          item.textContent = "";
          item.append(label);
          contactTextFractureState.set(item, { intensity: 0, impactX: 0, impactY: 0 });
        });
      }

      function setContactTextBlast(item, intensity, impactX, impactY) {
        const chars = item.querySelectorAll(".contact-text-char");
        if (!chars.length) return;

        if (intensity < 0.03) {
          item.classList.remove("is-blasted");
          chars.forEach((char) => {
            char.style.removeProperty("--contact-blast-x");
            char.style.removeProperty("--contact-blast-y");
            char.style.removeProperty("--contact-blast-rotate");
            char.style.removeProperty("--contact-blast-opacity");
            char.style.removeProperty("--contact-blast-blur");
            char.style.removeProperty("--contact-blast-scale");
          });
          return;
        }

        item.classList.add("is-blasted");
        chars.forEach((char, index) => {
          if (char.classList.contains("is-space")) {
            char.style.setProperty("--contact-blast-x", "0px");
            char.style.setProperty("--contact-blast-y", "0px");
            char.style.setProperty("--contact-blast-rotate", "0deg");
            char.style.setProperty("--contact-blast-opacity", "1");
            char.style.setProperty("--contact-blast-blur", "0px");
            char.style.setProperty("--contact-blast-scale", "1");
            return;
          }

          const rect = char.getBoundingClientRect();
          const centerX = rect.left + rect.width * 0.5;
          const centerY = rect.top + rect.height * 0.5;
          const dx = centerX - impactX;
          const dy = centerY - impactY;
          const distance = Math.hypot(dx, dy) || 1;
          const reach = 110 + intensity * 36;
          const falloff = Math.max(0, 1 - distance / reach);
          const push = intensity * falloff * (18 + (index % 3) * 3);
          const jitter = Math.sin(contactDinoState.lastAt * 0.02 + index * 1.7) * intensity * 1.4;
          const offsetX = (dx / distance) * push + jitter;
          const offsetY = (dy / distance) * push * 0.78 - intensity * falloff * 2.2;
          const rotate = ((dx * 0.04 + dy * 0.02) / Math.max(12, distance)) * intensity * 46;
          const blur = Math.max(0, intensity * falloff * 0.18);
          const opacity = Math.max(0.2, 1 - intensity * falloff * 0.1);
          const scale = 1 + intensity * falloff * 0.08;
          char.style.setProperty("--contact-blast-x", `${offsetX.toFixed(2)}px`);
          char.style.setProperty("--contact-blast-y", `${offsetY.toFixed(2)}px`);
          char.style.setProperty("--contact-blast-rotate", `${rotate.toFixed(2)}deg`);
          char.style.setProperty("--contact-blast-opacity", opacity.toFixed(2));
          char.style.setProperty("--contact-blast-blur", `${blur.toFixed(2)}px`);
          char.style.setProperty("--contact-blast-scale", `${scale.toFixed(3)}`);
        });
      }

      function updateContactTextBlast() {
        const items = contactPanel.querySelectorAll(".contact-line, .contact-kicker");
        const active = state.activeSection === "contact" && contactDinoState.waveRadius > 0;

        items.forEach((item) => {
          const blast =
            contactTextFractureState.get(item) || { intensity: 0, impactX: 0, impactY: 0 };

          if (!active) {
            blast.intensity += (0 - blast.intensity) * 0.18;
            setContactTextBlast(item, blast.intensity, blast.impactX, blast.impactY);
            contactTextFractureState.set(item, blast);
            return;
          }

          const rect = item.getBoundingClientRect();
          const centerX = rect.left + rect.width * 0.5;
          const centerY = rect.top + rect.height * 0.5;
          const distance = Math.hypot(
            centerX - contactDinoState.snoutViewport.x,
            centerY - contactDinoState.snoutViewport.y,
          );
          const band = 120;
          const targetIntensity = Math.max(
            0,
            Math.min(5.4, (band - Math.abs(distance - contactDinoState.waveRadius)) / 18),
          );
          blast.intensity +=
            (targetIntensity - blast.intensity) *
            (targetIntensity > blast.intensity ? 0.24 : 0.14);
          blast.impactX += (contactDinoState.snoutViewport.x - blast.impactX) * 0.24;
          blast.impactY += (contactDinoState.snoutViewport.y - blast.impactY) * 0.24;
          setContactTextBlast(item, blast.intensity, blast.impactX, blast.impactY);
          contactTextFractureState.set(item, blast);
        });

        contactPanel.classList.toggle("is-blasted", active);
      }

      function getHomeLizardAnchorPoint() {
        if (!homeNavButton) {
          return {
            x: lizardState.width * 0.22,
            y: Math.min(lizardState.height * 0.28, 220),
          };
        }

        const rect = homeNavButton.getBoundingClientRect();
        return {
          x: rect.left + rect.width * 0.72,
          y: rect.top - Math.max(56, rect.height * 1.6),
        };
      }

      function getHomeLizardParkedPoint() {
        const anchor = getHomeLizardAnchorPoint();
        return {
          x: anchor.x,
          y: anchor.y - Math.max(340, lizardState.height * 0.42),
        };
      }

      function updateHomeLizardAnchors() {
        const anchor = getHomeLizardAnchorPoint();
        const parked = getHomeLizardParkedPoint();
        lizardState.anchor.x = anchor.x;
        lizardState.anchor.y = anchor.y;
        lizardState.parked.x = parked.x;
        lizardState.parked.y = parked.y;
      }

      function updateHomeLizardState(previousSection = "") {
        updateHomeLizardAnchors();

        if (state.activeSection === "home") {
          if (previousSection !== "home") {
            setupLizard(
              8 / Math.sqrt(lizardState.legCount),
              lizardState.legCount,
              lizardState.tailCount,
            );
          }
          lizardState.renderVisible = true;
          homeLizardStage.classList.add("is-visible");
          if (previousSection !== "home" || lizardState.mode === "parked") {
            lizardState.mode = "entering";
          }
          return;
        }

        if (previousSection === "home" || lizardState.mode === "active" || lizardState.mode === "entering") {
          lizardState.renderVisible = true;
          lizardState.mode = "exiting";
          homeLizardStage.classList.add("is-visible");
          return;
        }

        if (lizardState.mode === "parked") {
          lizardState.renderVisible = false;
          homeLizardStage.classList.remove("is-visible");
        }
      }

      function setButtonFracture(button, intensity, impactX, impactY) {
        const chars = button.querySelectorAll(".nav-button-char");
        if (!chars.length) return;

        if (intensity < 0.04) {
          button.classList.remove("is-fractured");
          chars.forEach((char) => {
            char.style.removeProperty("--fracture-x");
            char.style.removeProperty("--fracture-y");
            char.style.removeProperty("--fracture-rotate");
            char.style.removeProperty("--fracture-opacity");
            char.style.removeProperty("--fracture-blur");
          });
          return;
        }

        button.classList.add("is-fractured");
        chars.forEach((char, index) => {
          if (char.classList.contains("is-space")) {
            char.style.setProperty("--fracture-x", "0px");
            char.style.setProperty("--fracture-y", "0px");
            char.style.setProperty("--fracture-rotate", "0deg");
            char.style.setProperty("--fracture-opacity", "1");
            char.style.setProperty("--fracture-blur", "0px");
            return;
          }

          const rect = char.getBoundingClientRect();
          const centerX = rect.left + rect.width * 0.5;
          const centerY = rect.top + rect.height * 0.5;
          const dx = centerX - impactX;
          const dy = centerY - impactY;
          const distance = Math.hypot(dx, dy) || 1;
          const reach = 78 + intensity * 18;
          const falloff = Math.max(0, 1 - distance / reach);
          const wobble = Math.sin(lizardState.time * 0.18 + index * 1.24) * intensity * 0.8;
          const drift = intensity * falloff * (5.2 + (index % 2) * 1.4);
          const offsetX = (dx / distance) * drift + wobble;
          const offsetY =
            (dy / distance) * drift * 0.72 +
            Math.cos(lizardState.time * 0.14 + index) * intensity * falloff * 0.9;
          const rotate =
            ((dx * 0.08 + dy * 0.03) / Math.max(10, distance)) * intensity * 18;
          const opacity = Math.max(0.4, 1 - falloff * intensity * 0.12);
          const blur = Math.max(0, falloff * intensity * 0.12);
          char.style.setProperty("--fracture-x", `${offsetX.toFixed(2)}px`);
          char.style.setProperty("--fracture-y", `${offsetY.toFixed(2)}px`);
          char.style.setProperty("--fracture-rotate", `${rotate.toFixed(2)}deg`);
          char.style.setProperty("--fracture-opacity", opacity.toFixed(2));
          char.style.setProperty("--fracture-blur", `${blur.toFixed(2)}px`);
        });
      }

      function getLizardImpactPoint(node, rect, padding = 10, best = null) {
        if (!node) return best;

        const expandedLeft = rect.left - padding;
        const expandedRight = rect.right + padding;
        const expandedTop = rect.top - padding;
        const expandedBottom = rect.bottom + padding;
        const dx =
          node.x < expandedLeft
            ? expandedLeft - node.x
            : node.x > expandedRight
              ? node.x - expandedRight
              : 0;
        const dy =
          node.y < expandedTop
            ? expandedTop - node.y
            : node.y > expandedBottom
              ? node.y - expandedBottom
              : 0;
        const distance = Math.hypot(dx, dy);
        let nextBest = best;

        if (!nextBest || distance < nextBest.distance) {
          nextBest = { distance, x: node.x, y: node.y };
        }

        if (!node.children?.length) return nextBest;

        for (let index = 0; index < node.children.length; index += 1) {
          nextBest = getLizardImpactPoint(node.children[index], rect, padding, nextBest);
        }

        return nextBest;
      }

      function updateLizardTextFracture() {
        navButtons.forEach((button) => {
          const fracture = navFractureState.get(button) || {
            intensity: 0,
            impactX: 0,
            impactY: 0,
          };
          if (!lizardState.renderVisible || !lizardState.critter) {
            fracture.intensity += (0 - fracture.intensity) * 0.24;
            setButtonFracture(button, fracture.intensity, fracture.impactX, fracture.impactY);
            navFractureState.set(button, fracture);
            return;
          }

          const rect = button.getBoundingClientRect();
          const impact = getLizardImpactPoint(lizardState.critter, rect, 8);
          const targetIntensity = impact
            ? Math.max(0, Math.min(4.6, (84 - impact.distance) / 18))
            : 0;

          fracture.intensity +=
            (targetIntensity - fracture.intensity) *
            (targetIntensity > fracture.intensity ? 0.28 : 0.18);

          if (impact) {
            fracture.impactX += (impact.x - fracture.impactX) * 0.34;
            fracture.impactY += (impact.y - fracture.impactY) * 0.34;
          }

          setButtonFracture(button, fracture.intensity, fracture.impactX, fracture.impactY);
          navFractureState.set(button, fracture);
        });
      }

      function measureLizardBounds(node, bounds = null) {
        const nextBounds = bounds || {
          minX: Number.POSITIVE_INFINITY,
          maxX: Number.NEGATIVE_INFINITY,
          minY: Number.POSITIVE_INFINITY,
          maxY: Number.NEGATIVE_INFINITY,
        };

        if (!node) return nextBounds;

        nextBounds.minX = Math.min(nextBounds.minX, node.x);
        nextBounds.maxX = Math.max(nextBounds.maxX, node.x);
        nextBounds.minY = Math.min(nextBounds.minY, node.y);
        nextBounds.maxY = Math.max(nextBounds.maxY, node.y);

        if (!node.children?.length) return nextBounds;

        for (let index = 0; index < node.children.length; index += 1) {
          measureLizardBounds(node.children[index], nextBounds);
        }

        return nextBounds;
      }

      class Segment {
        constructor(parent, size, angle, range, stiffness) {
          lizardState.segmentCount += 1;
          this.isSegment = true;
          this.parent = parent;
          if (typeof parent.children === "object") {
            parent.children.push(this);
          }
          this.children = [];
          this.size = size;
          this.relAngle = angle;
          this.defAngle = angle;
          this.absAngle = parent.absAngle + angle;
          this.range = range;
          this.stiffness = stiffness;
          this.updateRelative(false, true);
        }

        updateRelative(iterate, flex) {
          this.relAngle -=
            2 *
            Math.PI *
            Math.floor((this.relAngle - this.defAngle) / (2 * Math.PI) + 0.5);

          if (flex) {
            this.relAngle = Math.min(
              this.defAngle + this.range / 2,
              Math.max(
                this.defAngle - this.range / 2,
                (this.relAngle - this.defAngle) / this.stiffness + this.defAngle,
              ),
            );
          }

          this.absAngle = this.parent.absAngle + this.relAngle;
          this.x = this.parent.x + Math.cos(this.absAngle) * this.size;
          this.y = this.parent.y + Math.sin(this.absAngle) * this.size;

          if (!iterate) return;

          for (let index = 0; index < this.children.length; index += 1) {
            this.children[index].updateRelative(true, flex);
          }
        }

        draw(iterate) {
          homeLizardContext.beginPath();
          homeLizardContext.moveTo(this.parent.x, this.parent.y);
          homeLizardContext.lineTo(this.x, this.y);
          homeLizardContext.stroke();

          if (!iterate) return;

          for (let index = 0; index < this.children.length; index += 1) {
            this.children[index].draw(true);
          }
        }

        follow(iterate) {
          const x = this.parent.x;
          const y = this.parent.y;
          const dist = Math.hypot(this.x - x, this.y - y) || 1;
          this.x = x + (this.size * (this.x - x)) / dist;
          this.y = y + (this.size * (this.y - y)) / dist;
          this.absAngle = Math.atan2(this.y - y, this.x - x);
          this.relAngle = this.absAngle - this.parent.absAngle;
          this.updateRelative(false, true);

          if (!iterate) return;

          for (let index = 0; index < this.children.length; index += 1) {
            this.children[index].follow(true);
          }
        }
      }

      class LimbSystem {
        constructor(end, length, speed, creature) {
          this.end = end;
          this.length = Math.max(1, length);
          this.creature = creature;
          this.speed = speed;
          creature.systems.push(this);
          this.nodes = [];

          let node = end;
          for (let index = 0; index < length; index += 1) {
            this.nodes.unshift(node);
            node = node.parent;
            if (!node.isSegment) {
              this.length = index + 1;
              break;
            }
          }

          this.hip = this.nodes[0].parent;
        }

        moveTo(x, y) {
          this.nodes[0].updateRelative(true, true);
          let distance = Math.hypot(x - this.end.x, y - this.end.y);
          let length = Math.max(0, distance - this.speed);

          for (let index = this.nodes.length - 1; index >= 0; index -= 1) {
            const node = this.nodes[index];
            const angle = Math.atan2(node.y - y, node.x - x);
            node.x = x + length * Math.cos(angle);
            node.y = y + length * Math.sin(angle);
            x = node.x;
            y = node.y;
            length = node.size;
          }

          for (let index = 0; index < this.nodes.length; index += 1) {
            const node = this.nodes[index];
            node.absAngle = Math.atan2(node.y - node.parent.y, node.x - node.parent.x);
            node.relAngle = node.absAngle - node.parent.absAngle;

            for (let childIndex = 0; childIndex < node.children.length; childIndex += 1) {
              const childNode = node.children[childIndex];
              if (!this.nodes.includes(childNode)) {
                childNode.updateRelative(true, false);
              }
            }
          }
        }

        update() {
          this.moveTo(lizardState.input.mouse.x, lizardState.input.mouse.y);
        }
      }

      class LegSystem extends LimbSystem {
        constructor(end, length, speed, creature) {
          super(end, length, speed, creature);
          this.goalX = end.x;
          this.goalY = end.y;
          this.step = 0;
          this.forwardness = 0;
          this.reach = 0.9 * Math.hypot(this.end.x - this.hip.x, this.end.y - this.hip.y);

          let relAngle =
            this.creature.absAngle -
            Math.atan2(this.end.y - this.hip.y, this.end.x - this.hip.x);
          relAngle -= 2 * Math.PI * Math.floor(relAngle / (2 * Math.PI) + 0.5);
          this.swing = -relAngle + (2 * (relAngle < 0) - 1) * (Math.PI / 2);
          this.swingOffset = this.creature.absAngle - this.hip.absAngle;
        }

        update(x, y) {
          this.moveTo(this.goalX, this.goalY);

          if (this.step === 0) {
            const dist = Math.hypot(this.end.x - this.goalX, this.end.y - this.goalY);
            if (dist > 1) {
              this.step = 1;
              this.goalX =
                this.hip.x +
                this.reach * Math.cos(this.swing + this.hip.absAngle + this.swingOffset) +
                (2 * Math.random() - 1) * (this.reach / 2);
              this.goalY =
                this.hip.y +
                this.reach * Math.sin(this.swing + this.hip.absAngle + this.swingOffset) +
                (2 * Math.random() - 1) * (this.reach / 2);
            }
            return;
          }

          const theta =
            Math.atan2(this.end.y - this.hip.y, this.end.x - this.hip.x) - this.hip.absAngle;
          const dist = Math.hypot(this.end.x - this.hip.x, this.end.y - this.hip.y);
          const forwardness = dist * Math.cos(theta);
          const delta = this.forwardness - forwardness;
          this.forwardness = forwardness;

          if (delta * delta < 1) {
            this.step = 0;
            this.goalX = this.hip.x + (this.end.x - this.hip.x);
            this.goalY = this.hip.y + (this.end.y - this.hip.y);
          }
        }
      }

      class Creature {
        constructor(
          x,
          y,
          angle,
          fAccel,
          fFric,
          fRes,
          fThresh,
          rAccel,
          rFric,
          rRes,
          rThresh,
        ) {
          this.x = x;
          this.y = y;
          this.absAngle = angle;
          this.fSpeed = 0;
          this.speed = 0;
          this.fAccel = fAccel;
          this.fFric = fFric;
          this.fRes = fRes;
          this.fThresh = fThresh;
          this.rSpeed = 0;
          this.rAccel = rAccel;
          this.rFric = rFric;
          this.rRes = rRes;
          this.rThresh = rThresh;
          this.children = [];
          this.systems = [];
        }

        follow(x, y) {
          const dist = Math.hypot(this.x - x, this.y - y);
          const angle = Math.atan2(y - this.y, x - this.x);
          let accel = this.fAccel;

          if (this.systems.length > 0) {
            let sum = 0;
            for (let index = 0; index < this.systems.length; index += 1) {
              sum += this.systems[index].step === 0;
            }
            accel *= sum / this.systems.length;
          }

          this.fSpeed += accel * (dist > this.fThresh);
          this.fSpeed *= 1 - this.fRes;
          this.speed = Math.max(0, this.fSpeed - this.fFric);

          let diff = this.absAngle - angle;
          diff -= 2 * Math.PI * Math.floor(diff / (2 * Math.PI) + 0.5);
          if (Math.abs(diff) > this.rThresh && dist > this.fThresh) {
            this.rSpeed -= this.rAccel * (2 * (diff > 0) - 1);
          }

          this.rSpeed *= 1 - this.rRes;
          if (Math.abs(this.rSpeed) > this.rFric) {
            this.rSpeed -= this.rFric * (2 * (this.rSpeed > 0) - 1);
          } else {
            this.rSpeed = 0;
          }

          this.absAngle += this.rSpeed;
          this.absAngle -= 2 * Math.PI * Math.floor(this.absAngle / (2 * Math.PI) + 0.5);
          this.x += this.speed * Math.cos(this.absAngle);
          this.y += this.speed * Math.sin(this.absAngle);
          this.absAngle += Math.PI;

          for (let index = 0; index < this.children.length; index += 1) {
            this.children[index].follow(true, true);
          }

          for (let index = 0; index < this.systems.length; index += 1) {
            this.systems[index].update(x, y);
          }

          this.absAngle -= Math.PI;
          this.draw(true);
        }

        draw(iterate) {
          const radius = 4;
          homeLizardContext.beginPath();
          homeLizardContext.arc(
            this.x,
            this.y,
            radius,
            Math.PI / 4 + this.absAngle,
            (7 * Math.PI) / 4 + this.absAngle,
          );
          homeLizardContext.moveTo(
            this.x + radius * Math.cos((7 * Math.PI) / 4 + this.absAngle),
            this.y + radius * Math.sin((7 * Math.PI) / 4 + this.absAngle),
          );
          homeLizardContext.lineTo(
            this.x + radius * Math.cos(this.absAngle) * Math.SQRT2,
            this.y + radius * Math.sin(this.absAngle) * Math.SQRT2,
          );
          homeLizardContext.lineTo(
            this.x + radius * Math.cos(Math.PI / 4 + this.absAngle),
            this.y + radius * Math.sin(Math.PI / 4 + this.absAngle),
          );
          homeLizardContext.stroke();

          if (!iterate) return;

          for (let index = 0; index < this.children.length; index += 1) {
            this.children[index].draw(true);
          }
        }
      }

      function initializeLizardCanvas() {
        resizeLizardCanvas();
        lizardState.rafId = window.requestAnimationFrame(runLizardLoop);
      }

      function resizeLizardCanvas() {
        const dpr = window.devicePixelRatio || 1;
        lizardState.width = window.innerWidth;
        lizardState.height = window.innerHeight;
        homeLizardCanvas.width = Math.round(lizardState.width * dpr);
        homeLizardCanvas.height = Math.round(lizardState.height * dpr);
        homeLizardCanvas.style.width = `${lizardState.width}px`;
        homeLizardCanvas.style.height = `${lizardState.height}px`;
        homeLizardContext.setTransform(dpr, 0, 0, dpr, 0, 0);
        updateHomeLizardAnchors();
        if (!lizardState.input.mouse.x && !lizardState.input.mouse.y) {
          lizardState.input.mouse.x = lizardState.anchor.x;
          lizardState.input.mouse.y = lizardState.anchor.y;
        }

        setupLizard(
          8 / Math.sqrt(lizardState.legCount),
          lizardState.legCount,
          lizardState.tailCount,
        );
      }

      function handleLizardPointerMove(event) {
        lizardState.input.mouse.x = event.clientX;
        lizardState.input.mouse.y = event.clientY;
      }

      function handleLizardPointerDown(event) {
        lizardState.input.mouse.x = event.clientX;
        lizardState.input.mouse.y = event.clientY;
        if (event.button === 0) lizardState.input.mouse.left = true;
        if (event.button === 1) lizardState.input.mouse.middle = true;
        if (event.button === 2) lizardState.input.mouse.right = true;
      }

      function handleLizardPointerUp(event) {
        if (event.button === 0) lizardState.input.mouse.left = false;
        if (event.button === 1) lizardState.input.mouse.middle = false;
        if (event.button === 2) lizardState.input.mouse.right = false;
      }

      function handleLizardKeyDown(event) {
        if (event.keyCode >= 0 && event.keyCode < lizardState.input.keys.length) {
          lizardState.input.keys[event.keyCode] = true;
        }
      }

      function handleLizardKeyUp(event) {
        if (event.keyCode >= 0 && event.keyCode < lizardState.input.keys.length) {
          lizardState.input.keys[event.keyCode] = false;
        }
      }

      function runLizardLoop(timestamp) {
        if (
          lizardState.lastFrameAt &&
          timestamp - lizardState.lastFrameAt < lizardState.frameInterval
        ) {
          lizardState.rafId = window.requestAnimationFrame(runLizardLoop);
          return;
        }

        lizardState.lastFrameAt = timestamp;
        drawHomeLizard();
        lizardState.rafId = window.requestAnimationFrame(runLizardLoop);
      }

      function drawHomeLizard() {
        if (!homeLizardContext) return;

        homeLizardContext.clearRect(0, 0, lizardState.width, lizardState.height);
        if (!lizardState.renderVisible || !lizardState.critter) {
          updateLizardTextFracture();
          return;
        }

        lizardState.time += 1;
        let targetX = lizardState.input.mouse.x;
        let targetY = lizardState.input.mouse.y;

        if (lizardState.mode === "entering") {
          targetX = lizardState.anchor.x;
          targetY = lizardState.anchor.y;
        } else if (lizardState.mode === "exiting" || lizardState.mode === "parked") {
          targetX = lizardState.parked.x;
          targetY = lizardState.parked.y;
        }

        homeLizardContext.save();
        homeLizardContext.lineWidth = 1;
        homeLizardContext.lineCap = "round";
        homeLizardContext.lineJoin = "round";
        homeLizardContext.strokeStyle = "rgba(255, 255, 255, 0.82)";
        lizardState.critter.follow(targetX, targetY);
        if (lizardState.mode === "entering") {
          lizardState.critter.follow(targetX, targetY);
          lizardState.critter.follow(targetX, targetY);
        }
        homeLizardContext.restore();

        const distanceToGoal = Math.hypot(
          lizardState.critter.x - targetX,
          lizardState.critter.y - targetY,
        );
        const bounds = measureLizardBounds(lizardState.critter);

        if (lizardState.mode === "entering" && distanceToGoal < 24) {
          lizardState.mode = "active";
        }

        if (lizardState.mode === "exiting" && bounds.maxY < -28) {
          lizardState.mode = "parked";
          lizardState.renderVisible = false;
          homeLizardStage.classList.remove("is-visible");
        }

        updateLizardTextFracture();
      }

      function setupLizard(size, legs, tail) {
        const startPoint =
          lizardState.mode === "active"
            ? lizardState.anchor
            : lizardState.parked;
        const startX = startPoint.x;
        const startY = startPoint.y;
        const critter = new Creature(
          startX,
          startY,
          0,
          size * 12,
          size * 1.6,
          0.5,
          16,
          0.62,
          0.07,
          0.42,
          0.24,
        );

        lizardState.segmentCount = 0;

        let spinal = critter;
        for (let index = 0; index < 6; index += 1) {
          spinal = new Segment(spinal, size * 4, 0, (Math.PI * 2) / 3, 1.1);
          for (let side = -1; side <= 1; side += 2) {
            let node = new Segment(spinal, size * 3, side, 0.1, 2);
            for (let joint = 0; joint < 3; joint += 1) {
              node = new Segment(node, size * 0.1, -side * 0.1, 0.1, 2);
            }
          }
        }

        for (let legIndex = 0; legIndex < legs; legIndex += 1) {
          if (legIndex > 0) {
            for (let vertebra = 0; vertebra < 6; vertebra += 1) {
              spinal = new Segment(spinal, size * 4, 0, 1.571, 1.5);
              for (let side = -1; side <= 1; side += 2) {
                let node = new Segment(spinal, size * 3, side * 1.571, 0.1, 1.5);
                for (let rib = 0; rib < 3; rib += 1) {
                  node = new Segment(node, size * 3, -side * 0.3, 0.1, 2);
                }
              }
            }
          }

          for (let side = -1; side <= 1; side += 2) {
            let node = new Segment(spinal, size * 12, side * 0.785, 0, 8);
            node = new Segment(node, size * 16, -side * 0.785, 6.28, 1);
            node = new Segment(node, size * 16, side * 1.571, 3.1415, 2);
            for (let finger = 0; finger < 4; finger += 1) {
              new Segment(node, size * 4, (finger / 3 - 0.5) * 1.571, 0.1, 4);
            }
