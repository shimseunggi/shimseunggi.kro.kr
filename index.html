<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halftone Background</title>
    <style>
      :root {
        color-scheme: light dark;
        --overlay: rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
        background-color: #111;
        color: #fff;
        position: relative;
        overflow: hidden;
      }

      #halftone-background {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        background: #111;
      }

      .panel {
        width: min(560px, calc(100vw - 2rem));
        padding: 1.25rem;
        border-radius: 16px;
        background: color-mix(in srgb, var(--overlay), transparent 25%);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.15);
      }

      h1 {
        margin-top: 0;
        margin-bottom: 0.6rem;
        font-size: 1.2rem;
      }

      p {
        margin: 0 0 1rem;
        line-height: 1.5;
      }

      input[type="file"] {
        width: 100%;
        padding: 0.6rem;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.08);
      }

      .hint {
        margin-top: 0.75rem;
        opacity: 0.85;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <canvas id="halftone-background"></canvas>

    <main class="panel">
      <h1>Halftone Background</h1>
      <p>이미지 또는 영상을 선택하면 화면 배경을 halftone 스타일로 변환합니다.</p>
      <input id="media-input" type="file" accept="image/*,video/*" />
      <p id="status" class="hint">지원 형식: 이미지, MP4/WebM 등 영상</p>
    </main>

    <script type="module" src="./Background.js"></script>
  </body>
</html>
